<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Dashboard</title>
<style>
:root{
  --bg:#f5f6f8;--sf:#fff;--s2:#fafbfc;--bd:#e3e6eb;--tx:#13161c;--mu:#6b7280;--fa:#c4c9d2;
  --accent:#ff5a36;--accent-dark:#e0431f;--accent-bg:#fff0eb;--accent-bd:#ffb8a0;
  --food:#16a34a;--food-bg:#e9f9ef;--food-bd:#86e0aa;
  --weight:#6d5cf2;--weight-bg:#efedfe;--weight-bd:#c2b8fb;
  --gr:#16803c;--gbg:#e9f9ef;--gbd:#86e0aa;
  --am:#b45309;--abg:#fef3e0;--abd:#fbcd84;
  --re:#dc2626;--rbg:#fdeaea;--rbd:#f3a8a8;
  --bl:#1d4ed8;--bbg:#e9efff;--bbd:#a8c0fb;
  --topbar:#13161c;
  --ra:14px;--shadow:0 2px 8px rgba(19,22,28,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}
input,select,button,textarea{font-family:inherit}

/* DESKTOP LAYOUT */
@media (min-width: 700px) {
  body{background:var(--bd);display:flex;justify-content:center}
  .topbar{max-width:480px;margin:0 auto;width:100%;border-radius:0 0 var(--ra) var(--ra)}
  .sbody{max-width:480px;margin:0 auto;width:100%;background:var(--bg);padding:18px 18px 80px}
  .cal-card{max-width:420px;margin:0 auto 14px}
  .cal-grid{gap:4px;padding:6px 12px 14px}
  .cc{max-width:48px;justify-self:center}
  .cnav{width:32px;height:32px}
  .cnum{font-size:13px}
  .cc{cursor:pointer}
  .cc:hover{background:var(--s2)}
  #s-login{width:100%}
  #s-login > div{background:var(--tx);width:100%}
  #login-box{box-shadow:0 8px 32px rgba(0,0,0,.25)}
  .screen{width:100%;max-width:520px}
}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
.topbar{background:var(--topbar);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;flex-shrink:0;min-height:56px}
.topbar-back{background:rgba(255,255,255,.12);border:none;color:#fff;font-size:18px;cursor:pointer;padding:0;line-height:1;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-back:active{background:rgba(255,255,255,.22)}
.topbar-title{font-size:16px;font-weight:700;flex:1;letter-spacing:-.01em}
.topbar-eyebrow{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.07em;line-height:1.3;margin-bottom:1px}
.topbar-day{padding:12px 14px}
.topbar-day-center{flex:1;min-width:0}
.topbar-day-center .topbar-title{font-size:15px;line-height:1.25}
.topbar-day-nav{display:flex;gap:8px;flex-shrink:0}
.topbar-day-nav .topbar-back{width:32px;height:32px;font-size:16px}
.topbar-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.topbar-action{background:none;border:none;color:rgba(255,255,255,.85);font-size:12px;font-weight:600;cursor:pointer;padding:8px 6px;display:flex;align-items:center}
.sbody{flex:1;overflow-y:auto;padding:18px 14px 80px}
.sbody.center{display:flex;flex-direction:column;align-items:stretch}
.cal-card{background:var(--sf);border-radius:var(--ra);box-shadow:var(--shadow);overflow:hidden;margin-bottom:10px}
.cal-legend{display:flex;justify-content:center;gap:18px;padding:10px 14px;background:var(--sf);border-radius:var(--ra);box-shadow:var(--shadow);margin-bottom:14px}
.cal-legend-item{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--mu)}
.cal-legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--bd)}
.cal-lbl{font-size:15px;font-weight:700}
.cal-navs{display:flex;gap:8px}
.cnav{background:var(--s2);border:0.5px solid var(--bd);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:15px;color:var(--tx);display:inline-flex;align-items:center;justify-content:center}
.cnav:active{background:var(--bd)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 10px 4px}
.cal-dow span{text-align:center;font-size:10px;font-weight:700;color:var(--mu)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:4px 10px 12px}
.cc{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;border:1.5px solid transparent;transition:background .12s,border-color .12s}
.cc:active{background:var(--bd)}
.cc.today{border-color:var(--accent-bd)}
.cc.sel{background:var(--accent);border-color:var(--accent)}
.cc.sel.today{border-color:var(--accent-dark)}
.cc.sel .cnum{color:#fff;font-weight:700}
.cc.om .cnum{color:var(--fa)}
.cnum{font-size:13px;font-weight:500;line-height:1}
.cdots{display:flex;gap:3px;margin-top:4px;min-height:6px;justify-content:center}
.cdot{width:5px;height:5px;border-radius:50%;box-shadow:0 0 0 1px rgba(255,255,255,.6)}
.cc.sel .cdot{box-shadow:0 0 0 1px rgba(255,255,255,.9)}
.card{background:var(--sf);border-radius:var(--ra);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.card-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:0.5px solid var(--bd);background:var(--s2)}
.card-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;flex-shrink:0}
.card-title{font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em}
.card-action{font-size:12px;font-weight:600;color:var(--bl);background:none;border:none;cursor:pointer}
.card-body{padding:12px 14px}
.menu-list{background:var(--sf);border-radius:var(--ra);box-shadow:var(--shadow);overflow:hidden}
.menu-row{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:0.5px solid var(--bd);background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left;font-family:inherit}
.menu-row:last-child{border-bottom:none}
.menu-row:active{background:var(--s2)}
.menu-row-logout .menu-label{color:var(--re)}
.menu-row-logout .menu-icon{color:var(--re)}
.menu-icon{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--mu)}
.menu-label{font-size:14px;font-weight:500;color:var(--tx);flex:1}
.menu-chevron{font-size:16px;color:var(--mu)}
.slbl{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px}
.slbl:first-child{margin-top:0}
.badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:12px;white-space:nowrap;border:0.5px solid;display:inline-block}
.b-done{background:var(--gbg);color:var(--gr);border-color:var(--gbd)}.b-skip{background:var(--rbg);color:var(--re);border-color:var(--rbd)}
.b-rest{background:var(--bg);color:var(--mu);border-color:var(--bd)}.b-plan{background:var(--bbg);color:var(--bl);border-color:var(--bbd)}
.ex-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--bd)}
.ex-row:last-child{border-bottom:none}
.ex-n{font-size:12px}.ex-s{font-size:11px;color:var(--mu)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.stat{background:var(--s2);border-radius:9px;padding:9px 8px;text-align:center}
.stat-v{font-size:17px;font-weight:600}.stat-l{font-size:9px;color:var(--mu);margin-top:2px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mc{background:var(--s2);border-radius:10px;padding:10px 12px}
.mc-lbl{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.mc-val{font-size:19px;font-weight:600;line-height:1}.mc-sub{font-size:10px;color:var(--mu);margin-top:3px}
.pbar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:6px}
.pfill{height:4px;border-radius:2px}
.ppill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:7px;margin-top:4px}
.meal-view{background:var(--s2);border-radius:9px;margin-bottom:8px;overflow:hidden}
.meal-hdr{display:flex;justify-content:space-between;padding:8px 12px;background:var(--bd);align-items:center}
.meal-nm{font-size:12px;font-weight:600}.meal-kc{font-size:11px;font-weight:600;color:var(--bl)}
.meal-body{padding:4px 12px}
.mi{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--bd);align-items:center}
.mi:last-child{border-bottom:none}
.mi-n{font-size:11px;flex:1}.mi-k{font-size:11px;color:var(--mu)}
.mi-del{font-size:16px;color:var(--fa);background:none;border:none;cursor:pointer;padding:0 0 0 8px}
.flags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.flag{font-size:10px;font-weight:500;padding:4px 10px;border-radius:10px;border:0.5px solid}
.fg{background:var(--gbg);color:var(--gr);border-color:var(--gbd)}.fw{background:var(--abg);color:var(--am);border-color:var(--abd)}.fi{background:var(--bbg);color:var(--bl);border-color:var(--bbd)}
.st-row{display:flex;gap:8px;margin-bottom:14px}
.stb{flex:1;padding:10px 4px;border-radius:9px;border:0.5px solid var(--bd);background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;text-align:center;color:var(--mu);transition:all .1s}
.s-done{background:var(--gbg);color:var(--gr);border:1.5px solid var(--gr)}.s-skip{background:var(--rbg);color:var(--re);border:1.5px solid var(--re)}.s-rest{background:var(--weight-bg);color:var(--weight);border:1.5px solid var(--weight)}
.wgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.wf label{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
.wf input,.wf select{width:100%;padding:9px 10px;border:0.5px solid var(--bd);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx);outline:none}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--accent-bg);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 10px}
.profile-section{background:var(--sf);border-radius:var(--ra);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.profile-section-title{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.profile-field{margin-bottom:14px}
.profile-field:last-child{margin-bottom:0}
.profile-field label{display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:5px}
.profile-field input,.profile-field select{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:9px;font-size:14px;background:var(--bg);color:var(--tx);outline:none;font-family:inherit}
.profile-field input:focus,.profile-field select:focus{border-color:var(--accent)}
.profile-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.wf input:focus,.wf select:focus{border-color:var(--tx)}
.food-search{display:flex;gap:8px;margin-bottom:8px}
.food-search input{flex:1;padding:10px 12px;border:0.5px solid var(--bd);border-radius:9px;font-size:13px;background:var(--sf);color:var(--tx);outline:none}
.food-search input:focus{border-color:var(--tx)}
.search-btn{padding:10px 14px;background:var(--tx);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.search-btn:active{opacity:.8}
#food-search-input{width:100%;padding:10px 12px;border:0.5px solid var(--bd);border-radius:9px;font-size:13px;background:var(--sf);color:var(--tx);outline:none}
#food-search-input:focus{border-color:var(--tx)}
.food-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--sf);border:0.5px solid var(--bd);border-radius:9px;box-shadow:var(--shadow);max-height:240px;overflow-y:auto;z-index:30}
.food-dd-item{padding:10px 12px;cursor:pointer;border-bottom:0.5px solid var(--bd);font-size:13px}
.food-dd-item:last-child{border-bottom:none}
.food-dd-item:active{background:var(--s2)}
.food-dd-item .ddn{font-weight:600;color:var(--tx)}
.food-dd-item .ddb{font-size:11px;color:var(--mu);margin-top:2px}
.food-dd-empty{padding:12px;font-size:12px;color:var(--mu);text-align:center}
.qty-unit-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.qty-unit-row input,.qty-unit-row select{padding:10px 12px;border:0.5px solid var(--bd);border-radius:9px;font-size:13px;background:var(--sf);color:var(--tx);outline:none}
.qty-unit-row input:focus,.qty-unit-row select:focus{border-color:var(--tx)}
.lookup-result{background:var(--s2);border:0.5px solid var(--bd);border-radius:9px;padding:10px 12px;margin-bottom:8px}
.lr-name{font-size:13px;font-weight:600;margin-bottom:4px}
.lr-detail{font-size:11px;color:var(--mu);line-height:1.5}
.lr-actions{display:flex;gap:6px;margin-top:8px}
.qty-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.qty-row input{width:80px;padding:8px 10px;border:0.5px solid var(--bd);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx);outline:none;text-align:center}
.qty-row span{font-size:12px;color:var(--mu)}
.meal-type-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mt-btn{padding:6px 14px;border:0.5px solid var(--bd);border-radius:20px;background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;color:var(--mu)}
.mt-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.weight-input{display:flex;align-items:center;gap:10px;margin:8px 0}
.weight-input input{width:100px;padding:10px 12px;border:0.5px solid var(--bd);border-radius:9px;font-size:20px;font-weight:600;background:var(--bg);color:var(--tx);outline:none;text-align:center}
.weight-input input:focus{border-color:var(--tx)}
.weight-unit{font-size:14px;color:var(--mu);font-weight:600}
.weight-trend{display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:12px}
.wt-bar{flex:1;background:var(--weight-bg);border-radius:4px 4px 0 0;position:relative;min-width:0;transition:height .3s}
.wt-val{font-size:8px;color:var(--bl);text-align:center;margin-top:3px}
.wt-date{font-size:8px;color:var(--mu);text-align:center}
.insight-card{background:var(--sf);border-radius:var(--ra);box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
.ins-range-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.ins-range-btn{padding:9px 4px;border-radius:10px;border:1.5px solid var(--bd);background:var(--sf);font-size:12px;font-weight:600;color:var(--mu);cursor:pointer;text-align:center}
.ins-range-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.ins-custom-row{display:flex;gap:8px;align-items:center;background:var(--sf);border-radius:var(--ra);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:14px}
.ins-custom-row input{flex:1;padding:8px 10px;border:0.5px solid var(--bd);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx)}
.ins-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ins-stat{background:var(--sf);border-radius:var(--ra);box-shadow:var(--shadow);padding:13px 14px}
.ins-stat-lbl{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.ins-stat-val{font-size:20px;font-weight:700;line-height:1.1}
.ins-stat-sub{font-size:10px;color:var(--mu);margin-top:4px}
.ins-linechart{position:relative;height:120px;margin-top:6px}
.ins-linechart svg{width:100%;height:100%;display:block;overflow:visible}
.ins-linechart-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--mu)}
.ins-bars{display:flex;align-items:flex-end;gap:3px;height:80px;margin-top:8px}
.ins-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0}
.ins-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px}
.ins-bar-lbl{font-size:8px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.ic-title{font-size:13px;font-weight:700;margin-bottom:10px}
.ic-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--bd)}
.ic-row:last-child{border-bottom:none}
.ic-lbl{font-size:12px;color:var(--mu)}.ic-val{font-size:12px;font-weight:600}
.week-dots{display:flex;gap:6px;margin-top:8px}
.wd{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-direction:column}
.wd-lbl{font-size:8px;margin-top:2px}
.btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--ra);font-size:14px;font-weight:700;cursor:pointer;display:block;text-align:center;box-shadow:0 2px 6px rgba(255,90,54,.3)}
.btn:active{background:var(--accent-dark);box-shadow:0 1px 3px rgba(255,90,54,.3)}
.btn-out{background:var(--sf);color:var(--tx);border:1.5px solid var(--bd);box-shadow:none}
.btn-sm{background:none;color:var(--re);border:0.5px solid var(--rbd);font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer}
.btn-blue{background:var(--bbg);color:var(--bl);border:0.5px solid var(--bbd);font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer}
.btn-green{background:var(--gbg);color:var(--gr);border:0.5px solid var(--gbd);font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer}
.btn-gap{margin-top:10px}
.dayflip-nav{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.dayflip-btn{padding:11px 10px;background:var(--sf);color:var(--tx);border:1.5px solid var(--bd);border-radius:var(--ra);font-size:13px;font-weight:600;cursor:pointer;box-shadow:var(--shadow)}
.dayflip-btn:active{background:var(--s2)}
.wbtns{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.wb{padding:7px 12px;border:0.5px solid var(--bd);border-radius:8px;background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;color:var(--mu)}
.wb.on{background:var(--bbg);color:var(--bl);border-color:var(--bbd)}
.pbtns{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.pb{padding:7px 12px;border:0.5px solid var(--bd);border-radius:8px;background:var(--bg);font-size:11px;font-weight:600;cursor:pointer;color:var(--mu)}
.loading{display:flex;align-items:center;gap:8px;padding:12px;color:var(--mu);font-size:12px}
.spinner{width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--tx);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.divhr{height:0.5px;background:var(--bd);margin:14px 0}
.bnav{background:var(--sf);border-top:0.5px solid var(--bd);padding:8px 0 12px;display:flex;position:fixed;bottom:0;left:0;right:0;z-index:40}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0}
.bnav-icon{font-size:18px;line-height:1}
.bnav-lbl{font-size:9px;font-weight:600;color:var(--mu)}
.bnav-item.on .bnav-lbl{color:var(--tx)}
.empty{text-align:center;padding:24px 16px;color:var(--mu);font-size:12px;line-height:1.7;background:var(--s2);border-radius:var(--ra);border:0.5px dashed var(--fa)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:10px 18px;border-radius:14px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88%;width:max-content;text-align:center;line-height:1.4}
.toast.show{opacity:1}
.row-flex{display:flex;justify-content:space-between;align-items:center}

// Every call to goScreen() pushes a real browser history entry carrying the
// screen id. This is what makes iOS Safari's edge-swipe back/forward gesture
// work — without history entries, there's nothing for the gesture to act on.
// The popstate listener below drives the actual screen change when the user
// swipes back (or taps the browser's own back button); goBack() still works
// for in-app back buttons by simply calling history.back(), so both paths
// converge on the same popstate handler instead of doing two different things.
function goScreen(id, opts){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if(!opts||!opts.skipHistory){
    history.pushState({screen:id}, '', '#'+id);
  }
}
function goBack(){
  // Defer to the browser's own back navigation so it's indistinguishable
  // from a swipe-back gesture — popstate below does the actual screen swap.
  history.back();
}

  svg.setAttribute('width',size||18);
  svg.setAttribute('height',size||18);
  svg.setAttribute('fill','none');
  svg.setAttribute('stroke','currentColor');
  svg.setAttribute('stroke-width','2');
  svg.setAttribute('stroke-linecap','round');
  svg.setAttribute('stroke-linejoin','round');
  paths.forEach(function(d){
    var p=document.createElementNS(ns,'path');
    p.setAttribute('d',d);
    svg.appendChild(p);
  });
  return svg;
}

function renderMyPlan(){
  var body=document.getElementById('myplan-body');
  body.innerHTML='';

  if(sd!==todayKey()){
    var jumpRow=D('');jumpRow.style.cssText='margin-bottom:14px';
    jumpRow.appendChild(Btn('btn btn-out','Jump to today\'s suggestion',function(){
      sd=todayKey();
      renderMyPlan();
    }));
    body.appendChild(jumpRow);
  }

  var plan=getPlan(sd);
  var dateObj=new Date(sd+'T12:00:00');
  var dlabel=DS[dateObj.getDay()]+', '+dateObj.getDate()+' '+MS[dateObj.getMonth()]+' '+dateObj.getFullYear();

  var card=D('card');
  var hdr=D('card-hdr');
  hdr.appendChild(T('div','card-title',dlabel + (sd===todayKey()?' (today)':'')));
  card.appendChild(hdr);
  var cb=D('card-body');

  if(!plan){
    cb.appendChild(T('div','text-mu','No suggestion available before the plan\'s start date.'));
  } else {
    var nameRow=D('row-flex mb-8');
    nameRow.appendChild(T('div','text-bold',plan.n));
    nameRow.appendChild(T('div','badge b-plan',plan.ph));
    cb.appendChild(nameRow);
    if(plan.ex&&plan.ex.length){
      var el2=D('ex-list');
      plan.ex.forEach(function(e){
        var r=D('ex-row');ap(r,T('span','ex-n',e.n),T('span','ex-s',e.s));el2.appendChild(r);
      });
      cb.appendChild(el2);
    }
  }
  card.appendChild(cb);
  body.appendChild(card);

  var navRow=D('dayflip-nav');
  var prevBtn=Btn('dayflip-btn','‹ Previous day',function(){
    var d=new Date(sd+'T12:00:00');d.setDate(d.getDate()-1);
    sd=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    renderMyPlan();
  });
  var nextBtn=Btn('dayflip-btn','Next day ›',function(){
    var d=new Date(sd+'T12:00:00');d.setDate(d.getDate()+1);
    sd=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    renderMyPlan();
  });
  ap(navRow,prevBtn,nextBtn);
  body.appendChild(navRow);

  var note=D('');note.style.cssText='font-size:11px;color:var(--mu);margin-top:14px;line-height:1.5';
  note.textContent='This is your personal reference plan — it doesn\'t auto-fill the training log. Log your actual workout from the day view as usual.';
  body.appendChild(note);
}

// ── PROFILE ──────────────────────────────────────────────────────────────
// Stored at users/{uid}/profile/info, separate from the day-by-day logs and
// separate from Settings (which stays focused on app config like the API
// key). Kept intentionally simple: one clean form, one Save action.
var profileData={};

function profileRef(){
  if(!auth.currentUser)return null;
  return db.collection('users').doc(auth.currentUser.uid).collection('profile').doc('info');
}

function calcAge(dob){
  if(!dob)return null;
  var b=new Date(dob+'T12:00:00');
  var t=new Date();
  var age=t.getFullYear()-b.getFullYear();
  var m=t.getMonth()-b.getMonth();
  if(m<0||(m===0&&t.getDate()<b.getDate()))age--;
  return age>=0&&age<130?age:null;
}

function renderProfile(){
  var body=document.getElementById('profile-body');
  body.innerHTML='';
  var ref=profileRef();
  if(!ref){body.appendChild(T('div','empty','Sign in to manage your profile.'));return;}

  body.appendChild(T('div','loading','Loading profile...'));
  ref.get().then(function(doc){
    profileData=doc.exists?doc.data():{};
    buildProfileView();
  }).catch(function(){
    profileData={};
    buildProfileView();
  });
}

function profileHasAnyData(){
  return !!(profileData.name||profileData.dob||profileData.gender||profileData.height||profileData.weight||profileData.targetWeight);
}

function buildProfileView(){
  var body=document.getElementById('profile-body');
  body.innerHTML='';

  var initial=(profileData.name||(auth.currentUser&&auth.currentUser.email)||'?').trim().charAt(0).toUpperCase();
  var avatar=D('profile-avatar');avatar.textContent=initial;
  body.appendChild(avatar);

  if(!profileHasAnyData()){
    body.appendChild(T('div','empty','No profile details yet. Tap Edit to add your information.'));
    body.appendChild(Btn('btn btn-gap','Edit profile',buildProfileForm));
    return;
  }

  function viewRow(label,value){
    var r=D('profile-field');
    r.appendChild((function(){var l=E('label');l.textContent=label;return l;})());
    var v=D('');v.style.cssText='font-size:14px;color:var(--tx);padding:2px 0';
    v.textContent=(value===null||value===undefined||value==='')?'—':value;
    r.appendChild(v);
    return r;
  }

  var personal=D('profile-section');
  personal.appendChild(T('div','profile-section-title','Personal'));
  personal.appendChild(viewRow('Name',profileData.name));
  var dobAgeRow=D('profile-row2');
  var age=calcAge(profileData.dob);
  ap(dobAgeRow,
    viewRow('Date of birth',profileData.dob),
    viewRow('Age',age!==null?(age+' years'):null)
  );
  personal.appendChild(dobAgeRow);
  personal.appendChild(viewRow('Gender',profileData.gender));
  body.appendChild(personal);

  var health=D('profile-section');
  health.appendChild(T('div','profile-section-title','Health metrics'));
  var hRow=D('profile-row2');
  ap(hRow,
    viewRow('Height (cm)',profileData.height),
    viewRow('Current weight (kg)',profileData.weight)
  );
  health.appendChild(hRow);
  health.appendChild(viewRow('Target weight (kg)',profileData.targetWeight));
  body.appendChild(health);

  body.appendChild(Btn('btn btn-out btn-gap','Edit profile',buildProfileForm));
}

function buildProfileForm(){
  var body=document.getElementById('profile-body');
  body.innerHTML='';

  var initial=(profileData.name||(auth.currentUser&&auth.currentUser.email)||'?').trim().charAt(0).toUpperCase();
  var avatar=D('profile-avatar');avatar.textContent=initial;
  body.appendChild(avatar);

  function field(labelTxt,id,type,value,opts){
    var f=D('profile-field');
    var l=E('label');l.textContent=labelTxt;l.setAttribute('for',id);
    f.appendChild(l);
    var input;
    if(type==='select'){
      input=E('select');input.id=id;
      (opts||[]).forEach(function(o){
        var opt=E('option');opt.value=o;opt.textContent=o||'Select...';
        if(value===o)opt.selected=true;
        input.appendChild(opt);
      });
    } else {
      input=E('input');input.id=id;input.type=type;
      if(value!==undefined&&value!==null)input.value=value;
    }
    f.appendChild(input);
    return f;
  }

  // Personal section
  var personal=D('profile-section');
  personal.appendChild(T('div','profile-section-title','Personal'));
  personal.appendChild(field('Name','pf-name','text',profileData.name||''));
  var dobAgeRow=D('profile-row2');
  var dobField=field('Date of birth','pf-dob','date',profileData.dob||'');
  var ageField=D('profile-field');
  ageField.appendChild((function(){var l=E('label');l.textContent='Age';return l;})());
  var ageDisplay=D('');ageDisplay.id='pf-age-display';
  ageDisplay.style.cssText='padding:10px 12px;border:1.5px solid var(--bd);border-radius:9px;font-size:14px;color:var(--mu);background:var(--s2)';
  var curAge=calcAge(profileData.dob);
  ageDisplay.textContent=curAge!==null?(curAge+' years'):'—';
  ageField.appendChild(ageDisplay);
  ap(dobAgeRow,dobField,ageField);
  personal.appendChild(dobAgeRow);
  personal.appendChild(field('Gender','pf-gender','select',profileData.gender||'','Male,Female,Other,Prefer not to say'.split(',')));
  body.appendChild(personal);

  // Recalculate the displayed age live as DOB changes
  var dobInput=document.getElementById('pf-dob');
  if(dobInput)dobInput.addEventListener('change',function(){
    var a=calcAge(dobInput.value);
    var disp=document.getElementById('pf-age-display');
    if(disp)disp.textContent=a!==null?(a+' years'):'—';
  });

  // Health metrics section
  var health=D('profile-section');
  health.appendChild(T('div','profile-section-title','Health metrics'));
  var hRow=D('profile-row2');
  ap(hRow,
    field('Height (cm)','pf-height','number',profileData.height||''),
    field('Current weight (kg)','pf-weight','number',profileData.weight||'')
  );
  health.appendChild(hRow);
  health.appendChild(field('Target weight (kg)','pf-target','number',profileData.targetWeight||''));
  body.appendChild(health);

  var btnRow=D('');btnRow.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px';
  btnRow.appendChild(Btn('btn btn-out','Cancel',buildProfileView));
  btnRow.appendChild(Btn('btn','Save',saveProfile));
  body.appendChild(btnRow);
}

function saveProfile(){
  var ref=profileRef();
  if(!ref){showToast('Not signed in');return;}
  var data={
    name:(document.getElementById('pf-name')||{}).value||'',
    dob:(document.getElementById('pf-dob')||{}).value||'',
    gender:(document.getElementById('pf-gender')||{}).value||'',
    height:parseFloat((document.getElementById('pf-height')||{}).value)||null,
    weight:parseFloat((document.getElementById('pf-weight')||{}).value)||null,
    targetWeight:parseFloat((document.getElementById('pf-target')||{}).value)||null
  };
  ref.set(data,{merge:true}).then(function(){
    profileData=data;
    showToast('Profile saved');
    buildProfileView();
  }).catch(function(e){
    console.error(e);
    showToast('Save failed');
  });
}


window.addEventListener('popstate', function(e){
  var id = (e.state && e.state.screen) ? e.state.screen : 's-cal';
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  var el = document.getElementById(id);
  if(el) el.classList.add('active');
  window.scrollTo(0,0);
  if(id==='s-day') renderDayView();
  if(id==='s-cal') renderCal();
});

function daysRef(){
  if(!auth.currentUser) return null;
  return db.collection('users').doc(auth.currentUser.uid).collection('days');
}

function loadAll(){
  var ref=daysRef();
  if(!ref)return;
  ref.get().then(function(snap){
    snap.forEach(function(d){AD[d.id]=d.data();});
    renderCal();
  }).catch(function(e){console.error('FB:',e);});
}
function saveDay(dk,data,cb){
  var ref=daysRef();
  if(!ref){showToast('Not signed in');return;}
  ref.doc(dk).set(data,{merge:true}).then(function(){
    if(!AD[dk])AD[dk]={};
    Object.keys(data).forEach(function(k){AD[dk][k]=data[k];});
    showToast('Saved');renderCal();if(cb)cb();
  }).catch(function(e){showToast('Save failed');console.error(e);});
}

function renderCal(){
  var lbl=document.getElementById('cal-lbl');
  var grid=document.getElementById('cg');
  if(!lbl||!grid)return;
  lbl.textContent=MN[cm]+' '+cy;
  grid.innerHTML='';
  var today=todayKey();
  var first=new Date(cy,cm,1);
  var sdow=first.getDay();
  var dim=new Date(cy,cm+1,0).getDate();
  var pdim=new Date(cy,cm,0).getDate();
  for(var i=0;i<42;i++){
    var day,mo,yr,inM=true;
    if(i<sdow){day=pdim-sdow+i+1;mo=cm-1;yr=cy;if(mo<0){mo=11;yr--;}inM=false;}
    else if(i>=sdow+dim){day=i-sdow-dim+1;mo=cm+1;yr=cy;if(mo>11){mo=0;yr++;}inM=false;}
    else{day=i-sdow+1;mo=cm;yr=cy;}
    var dk=yr+'-'+pad(mo+1)+'-'+pad(day);
    var dd=AD[dk];
    var cc=D('cc');
    if(dk===sd)cc.classList.add('sel');
    if(dk===today)cc.classList.add('today');
    if(!inM)cc.classList.add('om');
    cc.appendChild(T('div','cnum',String(day)));
    var dots=D('cdots');
    if(dd&&dd.training&&dd.training.status==='done'){var d1=D('cdot');d1.style.background='var(--accent)';dots.appendChild(d1);}
    if(dd&&dd.food&&dd.food.meals&&dd.food.meals.length){var d2=D('cdot');d2.style.background='var(--food)';dots.appendChild(d2);}
    if(dd&&dd.weight){var d3=D('cdot');d3.style.background='var(--weight)';dots.appendChild(d3);}
    cc.appendChild(dots);
    (function(dkk,yrr,moo){cc.addEventListener('click',function(){
      sd=dkk;cy=yrr;cm=moo;
      renderDayView();goScreen('s-day');
    });})(dk,yr,mo);
    grid.appendChild(cc);
  }
}

function renderDayView(){
  var d=AD[sd]||{};
  var dateObj=new Date(sd+'T12:00:00');
  var dlabel=DS[dateObj.getDay()]+', '+dateObj.getDate()+' '+MS[dateObj.getMonth()]+' '+dateObj.getFullYear();
  document.getElementById('day-title').textContent=dlabel;

  var eyebrow=document.querySelector('#s-day .topbar-eyebrow');
  if(eyebrow) eyebrow.textContent = (sd===todayKey()) ? 'My Day · Today' : 'My Day';

  var prevBtn=document.getElementById('day-prev');
  var nextBtn=document.getElementById('day-next');
  if(prevBtn) prevBtn.onclick=function(){ shiftDay(-1); };
  if(nextBtn) nextBtn.onclick=function(){ shiftDay(1); };

  var body=document.getElementById('day-body');
  body.innerHTML='';

  var tc=D('card');
  var th=D('card-hdr');
  th.appendChild(dottedTitle('Training','var(--accent)'));
  var tBtn=Btn('card-action',isFutureDate(sd)?'Preview':(d.training&&d.training.status&&d.training.status!=='plan'?'Edit':'Log'),function(){renderTrainingForm();goScreen('s-training');});
  th.appendChild(tBtn);tc.appendChild(th);
  var tb=D('card-body');
  if(d.training&&d.training.status&&d.training.status!=='plan'){
    var st=d.training.status;
    var stMap={done:'b-done',skip:'b-skip',rest:'b-rest'};
    var stLbl={done:'Completed',skip:'Skipped',rest:'Rest day'};
    var tnr=D('row-flex mb-8');
    tnr.appendChild(T('div','text-bold',stLbl[st]||'Logged'));
    tnr.appendChild(T('div','badge '+(stMap[st]||'b-plan'),stLbl[st]||'Logged'));
    tb.appendChild(tnr);
    if(st==='done'&&(d.training.kcal||d.training.hr||d.training.duration)){
      var sg=D('stat-grid');
      function sv(l,v){var s=D('stat');ap(s,T('div','stat-v',String(v||'--')),T('div','stat-l',l));return s;}
      ap(sg,sv('Kcal burned',d.training.kcal||'--'),sv('Heart rate',d.training.hr||'--'),sv('Duration',d.training.duration||'--'));
      tb.appendChild(sg);
    }
    if(st==='done'&&d.training.description){
      var descBox=D('');descBox.style.cssText='margin-top:8px;font-size:12px;color:var(--tx);line-height:1.5;white-space:pre-wrap';
      descBox.textContent=d.training.description;
      tb.appendChild(descBox);
    }
  } else if(isFutureDate(sd)){
    tb.appendChild(T('div','text-mu','Nothing logged yet — this date is still upcoming.'));
  } else {
    tb.appendChild(T('div','text-mu','No training logged for this day yet.'));
  }
  tc.appendChild(tb);body.appendChild(tc);

  var fc=D('card');
  var fh=D('card-hdr');
  fh.appendChild(dottedTitle('Food','var(--food)'));
  var fBtn=Btn('card-action',isFutureDate(sd)?'Locked':'Log / Edit',function(){renderFoodForm();goScreen('s-food');});
  fh.appendChild(fBtn);fc.appendChild(fh);
  var fb=D('card-body');
  var f=d.food||{};
  var meals=dedupeMealsByName(f.meals||[]);
  if(meals.length){
    var tk=meals.reduce(function(a,m){return a+(m.kcal||0);},0);
    var kp=pct(tk,KT),wp=pct(f.water||0,WT),cp=pct(f.caffeine||0,CT);
    var mg=D('mgrid');
    function mcCard(lbl,valTxt,color,prog,sub){
      var m=D('mc');ap(m,T('div','mc-lbl',lbl));
      var v=D('mc-val');v.style.color=color;v.textContent=valTxt;m.appendChild(v);
      var pb=D('pbar');var pf=D('pfill');pf.style.cssText='width:'+prog+'%;background:'+color;pb.appendChild(pf);m.appendChild(pb);
      m.appendChild(T('div','mc-sub',sub));return m;
    }
    var pc=PCOLS[f.protein]||['var(--mu)','var(--bg)','var(--bd)'];
    var mcp=D('mc');ap(mcp,T('div','mc-lbl','Protein'));
    if(f.protein){var pill=T('div','ppill',f.protein);pill.style.cssText='background:'+pc[1]+';color:'+pc[0]+';border:0.5px solid '+pc[2];mcp.appendChild(pill);}
    else{mcp.appendChild(T('div','mc-sub','Not set'));}
    ap(mg,
      mcCard('Calories',tk+' / '+KT,kCol(kp),kp,KT-tk>0?(KT-tk)+' kcal remaining':'Target reached'),
      mcCard('Water',(f.water||0)+'L / '+WT+'L',wCol(wp),wp,WT-(f.water||0)>0?(WT-f.water)+'L to go':'Target reached'),
      mcCard('Caffeine',(f.caffeine||0)+'mg',cCol(cp),cp,(f.caffeine||0)>CT?'Over limit - affects sleep':'Within limit'),
      mcp
    );
    fb.appendChild(mg);
    meals.forEach(function(m){
      var mv=D('meal-view');
      var mh=D('meal-hdr');ap(mh,T('span','meal-nm',m.name),T('span','meal-kc',(m.kcal||0)+' kcal'));mv.appendChild(mh);
      if(m.items&&m.items.length){
        var mb=D('meal-body');
        m.items.forEach(function(it){
          var mi=D('mi');
          var mn=T('span','mi-n',it.n);
          var mk=T('span','mi-k',it.k+' kcal');
          if(it.p||it.c||it.fat){
            var detail=' (P:'+Math.round(it.p||0)+'g C:'+Math.round(it.c||0)+'g F:'+Math.round(it.fat||0)+'g)';
            mn.textContent=it.n+detail;
          }
          ap(mi,mn,mk);mb.appendChild(mi);
        });
        mv.appendChild(mb);
      }
      fb.appendChild(mv);
    });
    var flags=autoFlags(f,tk);
    var fd=D('flags');
    flags.forEach(function(fl){fd.appendChild(T('div','flag '+fl.c,fl.t));});
    fb.appendChild(fd);
  } else {
    fb.appendChild(T('div','empty','No food logged yet. Tap Log / Edit to add your meals.'));
  }
  fc.appendChild(fb);body.appendChild(fc);

  var wc=D('card');
  var wh=D('card-hdr');
  wh.appendChild(dottedTitle('Weight','var(--weight)'));
  var wBtn=Btn('card-action',isFutureDate(sd)?'Locked':'Log',function(){renderWeightForm();goScreen('s-weight');});
  wh.appendChild(wBtn);wc.appendChild(wh);
  var wb=D('card-body');
  if(d.weight){
    var wr=D('row-flex');
    var wv=D('');wv.style.cssText='font-size:28px;font-weight:700';wv.textContent=d.weight+' kg';
    var wt=D('');wt.style.cssText='font-size:11px;color:var(--mu);text-align:right';
    wt.textContent='Morning weight';
    var diff76=Math.round((d.weight-76)*10)/10;
    if(diff76!==0){
      var wdiff=T('div','',diff76>0?'+'+diff76+' from baseline':diff76+' from baseline');
      wdiff.style.cssText='font-size:10px;color:'+(diff76>0?'var(--am)':'var(--gr)');
      wt.appendChild(wdiff);
    }
    ap(wr,wv,wt);wb.appendChild(wr);
  } else {
    wb.appendChild(T('div','text-mu','No weight logged for this day.'));
  }
  wc.appendChild(wb);body.appendChild(wc);
}

function autoFlags(f,tk){
  var fl=[];var w=f.water||0,ca=f.caffeine||0,pr=f.protein||'';
  if(w>=4)fl.push({t:'4L water target hit',c:'fg'});else if(w>=2.5)fl.push({t:w+'L water - keep going',c:'fi'});else fl.push({t:'Low water intake',c:'fw'});
  if(ca>300)fl.push({t:'High caffeine - affects sleep',c:'fw'});else if(ca>0)fl.push({t:'Caffeine within limit',c:'fg'});
  if(!pr||pr==='Low')fl.push({t:'Low protein - add dal/eggs/paneer',c:'fw'});else if(pr==='Low-moderate'||pr==='Moderate')fl.push({t:'Protein moderate - can improve',c:'fi'});else fl.push({t:'Good protein intake',c:'fg'});
  if(tk<1200)fl.push({t:'Very low calories today',c:'fw'});else if(tk<KT)fl.push({t:'Calories below target',c:'fi'});else fl.push({t:'Good calorie intake',c:'fg'});
  return fl;
}

function renderTrainingForm(){
  var d=AD[sd]||{};
  var body=document.getElementById('training-body');
  body.innerHTML='';
  if(isFutureDate(sd)){
    body.appendChild(T('div','empty','This date hasn\'t happened yet — logging starts once the date arrives.'));
    return;
  }
  var cs=(d.training&&d.training.status)?d.training.status:'plan';
  tStatus=cs;

  body.appendChild(T('div','slbl','How did it go?'));
  var stRow=D('st-row');
  var detailSlot=D('');
  function mkStBtn(lbl,val){
    var b=Btn('stb',lbl,function(){
      tStatus=val;
      stRow.querySelectorAll('.stb').forEach(function(sb){sb.className='stb';});
      b.classList.add('s-'+val);
      detailSlot.innerHTML='';
      if(val==='done'){detailSlot.appendChild(buildWG(d));}
    });
    if(cs===val)b.classList.add('s-'+val);
    return b;
  }
  ap(stRow,mkStBtn('Completed','done'),mkStBtn('Skipped','skip'),mkStBtn('Rest day','rest'));
  body.appendChild(stRow);
  if(cs==='done'){detailSlot.appendChild(buildWG(d));}
  body.appendChild(detailSlot);

  body.appendChild(Btn('btn btn-gap','Save training',function(){
    var kc=document.getElementById('w-kc');
    var hr=document.getElementById('w-hr');
    var tm=document.getElementById('w-time');
    var ds=document.getElementById('w-desc');
    saveDay(sd,{training:{
      status:tStatus,
      description:ds?ds.value.trim():'',
      kcal:(tStatus==='done'&&kc)?(parseInt(kc.value)||null):null,
      hr:(tStatus==='done'&&hr)?(hr.value||null):null,
      duration:(tStatus==='done'&&tm)?(tm.value||null):null
    }},function(){goBack('s-day');});
  }));
}

function buildWG(d){
  var t=(d&&d.training)||{};
  var wg=D('');wg.appendChild(T('div','slbl','Workout details'));
  var grid=D('wgrid');
  function wf(lbl,id,type,ph,val){
    var f=D('wf');var l=E('label');l.textContent=lbl;
    var i=Inp(id,type,ph,val);ap(f,l,i);return f;
  }
  ap(grid,
    wf('Kcal burned','w-kc','number','520',t.kcal),
    wf('Avg HR','w-hr','text','135 bpm',t.hr),
    wf('Duration','w-time','text','45 min',t.duration)
  );
  wg.appendChild(grid);

  var descLbl=D('');descLbl.appendChild(T('div','slbl','What did you do? (optional)'));
  wg.appendChild(descLbl);
  var descIn=E('textarea');
  descIn.id='w-desc';
  descIn.placeholder='e.g. Upper body strength — bench press, rows, shoulder press, 4 sets each';
  descIn.value=t.description||'';
  descIn.style.cssText='width:100%;min-height:70px;padding:9px 10px;border:0.5px solid var(--bd);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx);outline:none;resize:vertical;font-family:inherit';
  wg.appendChild(descIn);

  return wg;
}

function renderFoodForm(){
  var d=AD[sd]||{};
  var f=d.food||{};
  fSavedMeals=f.meals?JSON.parse(JSON.stringify(f.meals)):[];
  // Consolidate any duplicate same-named meal cards left over from before
  // this merge logic existed (e.g. three separate "Drinks" cards from three
  // separate Add-to-meal taps) into one card per meal name.
  fSavedMeals=dedupeMealsByName(fSavedMeals);
  fWater=f.water||0;fProtein=f.protein||'';fCaff=f.caffeine||0;
  fItems=[];fLookupResult=null;fMealType='Lunch';
  // Always recalculate from the actual logged items when a day is opened —
  // a previously saved value doesn't mean the user manually set it, since it
  // could itself have been auto-calculated in an earlier session. "Manual"
  // only becomes true once the user explicitly edits the field themselves
  // within the current editing session (see the input/click handlers below).
  fCaffManual=false;
  fProteinManual=false;
  var dateObj=new Date(sd+'T12:00:00');
  document.getElementById('food-date-lbl').textContent=DS[dateObj.getDay()]+' '+dateObj.getDate()+' '+MS[dateObj.getMonth()];
  buildFoodForm();
}

function dedupeMealsByName(meals){
  var byName={};
  var order=[];
  meals.forEach(function(m){
    var key=(m.name||'').toLowerCase();
    if(!byName[key]){
      byName[key]={name:m.name,items:[],kcal:0};
      order.push(key);
    }
    byName[key].items=byName[key].items.concat(m.items||[]);
  });
  return order.map(function(key){
    var m=byName[key];
    m.kcal=m.items.reduce(function(a,it){return a+(it.k||0);},0);
    return m;
  });
}

function buildFoodForm(){
  var body=document.getElementById('food-body');
  body.innerHTML='';

  if(isFutureDate(sd)){
    body.appendChild(T('div','empty','This date hasn\'t happened yet — food logging opens up once the day arrives.'));
    return;
  }

  body.appendChild(T('div','slbl','Meal type'));
  var mtRow=D('meal-type-row');
  ['Breakfast','Lunch','Dinner','Snack','Drinks'].forEach(function(mt){
    var b=Btn('mt-btn',mt,function(){
      fMealType=mt;
      mtRow.querySelectorAll('.mt-btn').forEach(function(bb){bb.classList.remove('on');});
      b.classList.add('on');
    });
    if(fMealType===mt)b.classList.add('on');
    mtRow.appendChild(b);
  });
  body.appendChild(mtRow);

  body.appendChild(T('div','slbl','Add food item'));
  var hint=T('div','','Search for a food, then enter how much you had');
  hint.style.cssText='font-size:11px;color:var(--mu);margin-bottom:8px;line-height:1.5';
  body.appendChild(hint);

  fSelectedFood=null;

  var foodSearchWrap=D('');foodSearchWrap.style.cssText='position:relative;margin-bottom:10px';
  var sInput=Inp('food-search-input','text','Search for a food (e.g. rice, sambar, banana)');
  sInput.autocomplete='off';
  var dropdown=D('food-dropdown');dropdown.id='food-dropdown';
  dropdown.style.display='none';
  foodSearchWrap.appendChild(sInput);
  foodSearchWrap.appendChild(dropdown);
  body.appendChild(foodSearchWrap);

  sInput.addEventListener('input',function(){
    fSelectedFood=null;
    qtyRow.style.display='none';
    addRow.style.display='none';
    var q=sInput.value.trim();
    if(fSearchTimer)clearTimeout(fSearchTimer);
    if(q.length<2){dropdown.style.display='none';dropdown.innerHTML='';return;}
    fSearchTimer=setTimeout(function(){ searchFoods(q,dropdown,sInput,qtyRow,addRow); },350);
  });
  sInput.addEventListener('blur',function(){
    setTimeout(function(){dropdown.style.display='none';},150);
  });
  sInput.addEventListener('focus',function(){
    if(dropdown.innerHTML)dropdown.style.display='block';
  });

  var qtyRow=D('qty-unit-row');qtyRow.style.display='none';
  var qtyIn=Inp('food-qty-input','number','Quantity, e.g. 200');
  var unitSel=E('select','qty-unit-select');unitSel.id='food-unit-select';
  [['g','grams (g)'],['kg','kilograms (kg)'],['ml','millilitres (ml)'],['l','litres (l)']].forEach(function(opt){
    var o=E('option');o.value=opt[0];o.textContent=opt[1];unitSel.appendChild(o);
  });
  ap(qtyRow,qtyIn,unitSel);
  body.appendChild(qtyRow);

  var addRow=D('');addRow.style.cssText='display:none;margin-top:8px';
  var addToMealBtn=Btn('btn-green','Add to meal',function(){
    addSelectedFoodToMeal(qtyIn,unitSel,sInput,dropdown,qtyRow,addRow);
  });
  addRow.appendChild(addToMealBtn);
  body.appendChild(addRow);

  var manualLink=E('button','login-link');
  manualLink.textContent='Can\'t find it? Enter manually instead';
  manualLink.style.cssText='text-align:left;margin:0 0 8px;padding:0;font-size:12px';
  manualLink.addEventListener('click',function(){
    var area=document.getElementById('lookup-area');
    area.innerHTML='';
    showManualEntry(area,sInput.value.trim());
  });
  body.appendChild(manualLink);

  var resultArea=D('');resultArea.id='lookup-area';body.appendChild(resultArea);

  if(fItems.length){
    body.appendChild(T('div','slbl','Items in this meal'));
    var itemsDiv=D('');itemsDiv.id='items-div';
    fItems.forEach(function(it,i){
      var mi=D('mi');
      var mn=D('mi-n');mn.textContent=it.n+(it.p?' (P:'+Math.round(it.p)+'g C:'+Math.round(it.c||0)+'g F:'+Math.round(it.fat||0)+'g)':'');
      var mk=T('span','mi-k',it.k+' kcal');
      var del=Btn('mi-del','x',function(){fItems.splice(i,1);buildFoodForm();});
      ap(mi,mn,mk,del);itemsDiv.appendChild(mi);
    });
    body.appendChild(itemsDiv);
    var totalRow=D('row-flex');totalRow.style.cssText='padding:8px 0;border-top:0.5px solid var(--bd);margin-bottom:4px';
    var totalKc=fItems.reduce(function(a,i){return a+i.k;},0);
    totalRow.appendChild(T('div','text-bold','Total'));
    var tv=T('div','text-bold',totalKc+' kcal');tv.style.color='var(--bl)';
    totalRow.appendChild(tv);body.appendChild(totalRow);
    body.appendChild(Btn('btn','Save meal - '+fMealType,saveMeal));
    var saveHint=T('div','','Or just tap "Save food log" at the bottom — these items are included either way.');
    saveHint.style.cssText='font-size:10px;color:var(--mu);margin-top:6px;line-height:1.4';
    body.appendChild(saveHint);
    body.appendChild(T('div','','\u00a0'));
  }

  if(fSavedMeals.length){
    body.appendChild(T('div','slbl','Saved meals today'));
    fSavedMeals.forEach(function(m,mi){
      var mv=D('meal-view');
      var mh=D('meal-hdr');ap(mh,T('span','meal-nm',m.name),T('span','meal-kc',(m.kcal||0)+' kcal'));
      var rmBtn=Btn('btn-sm','Remove meal',function(){fSavedMeals.splice(mi,1);saveAllFood(false);});
      rmBtn.style.cssText='padding:2px 8px;font-size:10px';
      mh.appendChild(rmBtn);mv.appendChild(mh);
      if(m.items&&m.items.length){
        var mb=D('meal-body');
        m.items.forEach(function(it,ii){
          var miEl=D('mi');
          var mn=T('span','mi-n',it.n);
          if(it.p||it.c||it.fat)mn.textContent+=(' (P:'+Math.round(it.p||0)+'g C:'+Math.round(it.c||0)+'g F:'+Math.round(it.fat||0)+'g)');
          var mk=T('span','mi-k',it.k+' kcal');
          var delBtn=Btn('mi-del','x',(function(mIdx,iIdx){
            return function(){
              fSavedMeals[mIdx].items.splice(iIdx,1);
              if(fSavedMeals[mIdx].items.length===0){
                // No items left in this meal — remove the empty meal too
                // rather than leaving a zero-item meal card behind.
                fSavedMeals.splice(mIdx,1);
              } else {
                fSavedMeals[mIdx].kcal=fSavedMeals[mIdx].items.reduce(function(a,x){return a+(x.k||0);},0);
              }
              saveAllFood(false);
            };
          })(mi,ii));
          ap(miEl,mn,mk,delBtn);mb.appendChild(miEl);
        });
        mv.appendChild(mb);
      }
      body.appendChild(mv);
    });
  }

  body.appendChild(T('div','slbl','Water intake today'));
  var wbtns=D('wbtns');
  [0.5,1,1.5,2,2.5,3,3.5,4,4.5,5].forEach(function(v){
    var wb=Btn('wb'+(fWater===v?' on':''),v+'L',function(){
      fWater=v;wbtns.querySelectorAll('button').forEach(function(b){b.className='wb'+(parseFloat(b.textContent)===v?' on':'');});
    });
    wbtns.appendChild(wb);
  });
  body.appendChild(wbtns);

  // Derive caffeine and protein automatically from everything logged so far
  // today (saved meals + items not yet folded in). Both stay editable —
  // auto-fill is a starting point, not a lock, since manual entries and
  // Open Food Facts items don't carry caffeine data and protein thresholds
  // are necessarily approximate.
  var allItemsForCalc=[];
  fSavedMeals.forEach(function(m){ if(m.items) allItemsForCalc=allItemsForCalc.concat(m.items); });
  allItemsForCalc=allItemsForCalc.concat(fItems);
  var autoCaff=Math.round(allItemsForCalc.reduce(function(a,i){return a+(i.caff||0);},0));
  var autoProteinG=allItemsForCalc.reduce(function(a,i){return a+(i.p||0);},0);

  function proteinLevelFromGrams(g){
    if(g<=0)return '';
    if(g<30)return 'Low';
    if(g<55)return 'Low-moderate';
    if(g<80)return 'Moderate';
    if(g<110)return 'Good';
    return 'High';
  }

  // Only auto-fill if the user hasn't manually edited this value for today
  // (so reopening a day you set by hand won't silently overwrite it, but a
  // value that's still purely auto-derived keeps updating as items change).
  if(!fCaffManual && autoCaff>0) fCaff=autoCaff;
  if(!fProteinManual && autoProteinG>0) fProtein=proteinLevelFromGrams(autoProteinG);

  body.appendChild(T('div','slbl','Caffeine (mg)'));
  var cfHint=T('div','',(autoCaff>0&&!fCaffManual)?('Auto-estimated from logged drinks: '+autoCaff+'mg — adjust if needed'):'1 coffee with milk ~90mg, 1 tea with milk ~50mg');
  cfHint.style.cssText='font-size:10px;color:var(--mu);margin-bottom:6px';
  body.appendChild(cfHint);
  var cfIn=Inp('cf-in','number','e.g. 200',fCaff||'');
  cfIn.style.cssText='width:100%;padding:10px 12px;border:0.5px solid var(--bd);border-radius:9px;font-size:14px;background:var(--bg);color:var(--tx);outline:none';
  cfIn.addEventListener('input',function(){ fCaffManual=true; });
  body.appendChild(cfIn);

  body.appendChild(T('div','slbl','Overall protein level'));
  var pHint=T('div','',(autoProteinG>0&&!fProteinManual)?('Auto-estimated from logged food: ~'+Math.round(autoProteinG)+'g protein — adjust if needed'):'Estimated automatically once you log food with protein content');
  pHint.style.cssText='font-size:10px;color:var(--mu);margin-bottom:6px';
  body.appendChild(pHint);
  var pbtns=D('pbtns');
  ['Low','Low-moderate','Moderate','Good','High'].forEach(function(p){
    var pc2=PCOLS[p]||['var(--mu)','var(--bg)','var(--bd)'];
    var isOn=fProtein===p;
    var pb=Btn('pb',p,function(){
      fProtein=p;
      fProteinManual=true;
      pbtns.querySelectorAll('button').forEach(function(b){
        var on=b.textContent===p;var c=PCOLS[b.textContent]||['var(--mu)','var(--bg)','var(--bd)'];
        b.style.background=on?c[1]:'';b.style.color=on?c[0]:'';b.style.borderColor=on?c[0]:'';
      });
    });
    if(isOn){pb.style.background=pc2[1];pb.style.color=pc2[0];pb.style.borderColor=pc2[0];}
    pbtns.appendChild(pb);
  });
  body.appendChild(pbtns);

  body.appendChild(Btn('btn btn-gap','Save food log',function(){saveAllFood(true);}));
}

function searchFoods(query,dropdown,sInput,qtyRow,addRow){
  dropdown.innerHTML='';
  var loading=D('food-dd-empty');loading.textContent='Searching...';
  dropdown.appendChild(loading);dropdown.style.display='block';

  var localResults=[];
  var ql=query.toLowerCase();
  Object.keys(INDIAN_DB_PER100).forEach(function(key){
    if(key.indexOf(ql)>=0||ql.indexOf(key)>=0){
      localResults.push({name:key.charAt(0).toUpperCase()+key.slice(1),source:'Common foods',per100:INDIAN_DB_PER100[key]});
    }
  });

  // Open Food Facts is branded/packaged-product data — useful for things
  // genuinely not in the common-foods list above, but a poor primary source
  // for everyday dishes (it has near-zero coverage of things like "black
  // coffee" or "butter naan"). So it's only queried as a fallback, and only
  // when the local list comes up empty.
  if(localResults.length>0){
    renderFoodDropdown(localResults,dropdown,sInput,qtyRow,addRow);
    return;
  }

  fetch('https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(query)+'&search_simple=1&action=process&json=1&page_size=8&fields=product_name,nutriments,brands')
    .then(function(r){return r.json();})
    .then(function(data){
      var results=[];
      if(data.products){
        data.products.forEach(function(p){
          if(!p.product_name)return;
          var n=p.nutriments||{};
          var kcal100=n['energy-kcal_100g']||(n['energy_100g']?n['energy_100g']/4.184:null);
          if(kcal100===null||kcal100===undefined)return;
          results.push({
            name:p.product_name+(p.brands?' ('+p.brands.split(',')[0]+')':''),
            source:'Open Food Facts',
            per100:{
              k:Math.round(kcal100),
              p:n['proteins_100g']||0,
              c:n['carbohydrates_100g']||0,
              fat:n['fat_100g']||0,
              kind:'g'
            }
          });
        });
      }
      renderFoodDropdown(results,dropdown,sInput,qtyRow,addRow);
    })
    .catch(function(){
      renderFoodDropdown([],dropdown,sInput,qtyRow,addRow);
    });
}

function renderFoodDropdown(results,dropdown,sInput,qtyRow,addRow){
  dropdown.innerHTML='';
  if(!results.length){
    var empty=D('food-dd-empty');
    empty.textContent='No matches — try "Enter manually instead" below';
    dropdown.appendChild(empty);
    dropdown.style.display='block';
    return;
  }
  results.slice(0,12).forEach(function(r){
    var item=D('food-dd-item');
    item.appendChild(T('div','ddn',r.name));
    item.appendChild(T('div','ddb',r.source+' · '+r.per100.k+' kcal per 100'+(r.per100.kind==='ml'?'ml':'g')));
    // mousedown fires before the input's blur, so selection registers even
    // though the dropdown is about to be hidden by the blur handler.
    item.addEventListener('mousedown',function(e){
      e.preventDefault();
      fSelectedFood=r;
      sInput.value=r.name;
      dropdown.style.display='none';
      qtyRow.style.display='grid';
      addRow.style.display='block';
      var qtyIn=document.getElementById('food-qty-input');
      var unitSel=document.getElementById('food-unit-select');
      if(unitSel)unitSel.value=r.per100.kind==='ml'?'ml':'g';
      if(qtyIn)qtyIn.focus();
    });
    dropdown.appendChild(item);
  });
  dropdown.style.display='block';
}

function unitToGramsOrMl(qty,unit){
  // Normalises any unit into the base 100g/100ml reference used by per100
  // nutrition data — kg and l just need converting to g/ml first.
  if(unit==='kg')return qty*1000;
  if(unit==='l')return qty*1000;
  return qty;
}

function addSelectedFoodToMeal(qtyIn,unitSel,sInput,dropdown,qtyRow,addRow){
  if(!fSelectedFood){showToast('Pick a food from the list first');return;}
  var qty=parseFloat(qtyIn.value);
  if(!qty||qty<=0){showToast('Enter a quantity');return;}
  var unit=unitSel.value;
  var baseQty=unitToGramsOrMl(qty,unit);
  var per100=fSelectedFood.per100;
  var ratio=baseQty/100;
  var unitLabel=unit==='kg'?'kg':unit==='l'?'L':unit;

  fItems.push({
    n:fSelectedFood.name+' ('+qty+unitLabel+')',
    k:Math.round(per100.k*ratio),
    p:Math.round(per100.p*ratio*10)/10,
    c:Math.round(per100.c*ratio*10)/10,
    fat:Math.round(per100.fat*ratio*10)/10,
    caff:Math.round((per100.caff||0)*ratio)
  });

  fSelectedFood=null;
  sInput.value='';
  qtyIn.value='';
  dropdown.style.display='none';
  qtyRow.style.display='none';
  addRow.style.display='none';
  buildFoodForm();
}

// Folds a batch of items into fSavedMeals under the given meal name —
// merging into an existing same-named meal (e.g. a second "Drinks" entry
// added later in the day) rather than always creating a new card. Name
// matching is case-insensitive so "Lunch" and "lunch" merge correctly.
function mergeItemsIntoMeal(mealName, items){
  if(!items.length)return;
  var existing=null;
  for(var i=0;i<fSavedMeals.length;i++){
    if(fSavedMeals[i].name.toLowerCase()===mealName.toLowerCase()){existing=fSavedMeals[i];break;}
  }
  if(existing){
    existing.items=(existing.items||[]).concat(items);
    existing.kcal=existing.items.reduce(function(a,it){return a+(it.k||0);},0);
  } else {
    var kc=items.reduce(function(a,it){return a+(it.k||0);},0);
    fSavedMeals.push({name:mealName,kcal:kc,items:items.slice()});
  }
}

function saveMeal(){
  if(!fItems.length){showToast('Add at least one item first');return;}
  mergeItemsIntoMeal(fMealType,fItems);
  fItems=[];fLookupResult=null;
  showToast(fMealType+' saved');
  saveAllFood(false);
}

function saveAllFood(goToDayAfter){
  // If there are items added via search-and-quantity but the user tapped
  // "Save food log" directly without first tapping "Save meal", fold them in
  // here automatically rather than silently dropping them — this was the
  // actual bug: items shown in the "Items in this meal" preview were never
  // making it into fSavedMeals (and therefore never into Firestore) unless
  // the user explicitly used the separate Save meal button first.
  if(fItems.length){
    mergeItemsIntoMeal(fMealType,fItems);

    if(goToDayAfter){goBack('s-day');}else{buildFoodForm();}
  });
}

function resolveInsightsRange(){
  var end=new Date();end.setHours(12,0,0,0);
  var start=new Date(end);
  if(insRange==='7d'){start.setDate(end.getDate()-6);}
  else if(insRange==='30d'){start.setDate(end.getDate()-29);}
  else if(insRange==='year'){start=new Date(end.getFullYear(),0,1);}
  else if(insRange==='custom'&&insCustomStart&&insCustomEnd){
    start=new Date(insCustomStart+'T12:00:00');
    end.setTime(new Date(insCustomEnd+'T12:00:00').getTime());
  }
  var days=[];
  var cur=new Date(start);
  while(cur<=end){
    var dk=cur.getFullYear()+'-'+pad(cur.getMonth()+1)+'-'+pad(cur.getDate());
    days.push({dk:dk,d:AD[dk]||{},lbl:DS[cur.getDay()].substring(0,3),date:new Date(cur)});
    cur.setDate(cur.getDate()+1);
  }
  return days;
}

// Builds a simple SVG polyline chart for a series of {x,y} points, with
// nulls (missing data) creating a gap rather than a misleading straight
// line across days with no entry.
function buildLineChart(points,color,minY,maxY){
  var w=320,h=120,padX=4,padY=10;
  var validPts=points.filter(function(p){return p.y!==null;});
  if(!validPts.length)return null;
  if(minY===undefined)minY=Math.min.apply(null,validPts.map(function(p){return p.y;}));
  if(maxY===undefined)maxY=Math.max.apply(null,validPts.map(function(p){return p.y;}));
  if(minY===maxY){minY-=1;maxY+=1;}
  var n=points.length;
  function xAt(i){return padX+(i/(n-1||1))*(w-padX*2);}
  function yAt(v){return h-padY-((v-minY)/(maxY-minY))*(h-padY*2);}

  var segments=[];
  var cur=[];
  points.forEach(function(p,i){
    if(p.y===null){
      if(cur.length)segments.push(cur);
      cur=[];
    } else {
      cur.push(xAt(i)+','+yAt(p.y));
    }
  });
  if(cur.length)segments.push(cur);

  var ns='http://www.w3.org/2000/svg';
  var svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 '+w+' '+h);
  svg.setAttribute('preserveAspectRatio','none');

  segments.forEach(function(seg){
    if(seg.length>1){
      var poly=document.createElementNS(ns,'polyline');
      poly.setAttribute('points',seg.join(' '));
      poly.setAttribute('fill','none');
      poly.setAttribute('stroke',color);
      poly.setAttribute('stroke-width','2.5');
      poly.setAttribute('stroke-linecap','round');
      poly.setAttribute('stroke-linejoin','round');
      svg.appendChild(poly);
    }
  });
  points.forEach(function(p,i){
    if(p.y!==null){
      var dot=document.createElementNS(ns,'circle');
      dot.setAttribute('cx',xAt(i));dot.setAttribute('cy',yAt(p.y));dot.setAttribute('r','3');
      dot.setAttribute('fill',color);
      svg.appendChild(dot);
    }
  });
  return svg;
}

function renderInsightsBody(){
  var body=document.getElementById('insights-body');
  body.innerHTML='';
  var rangeDays=resolveInsightsRange();
  if(!rangeDays.length){
    body.appendChild(T('div','empty','No dates in this range.'));
    return;
  }

  var n=rangeDays.length;
  var workoutDays=rangeDays.filter(function(d){return d.d.training&&d.d.training.status==='done';}).length;
  var foodDays=rangeDays.filter(function(d){return d.d.food&&d.d.food.meals&&d.d.food.meals.length;}).length;
  var kcalEntries=rangeDays.filter(function(d){return d.d.food&&d.d.food.kcal;});
  var avgKcal=kcalEntries.length?Math.round(kcalEntries.reduce(function(a,d){return a+d.d.food.kcal;},0)/kcalEntries.length):0;
  var waterEntries=rangeDays.filter(function(d){return d.d.food&&d.d.food.water;});
  var avgWater=waterEntries.length?Math.round(waterEntries.reduce(function(a,d){return a+d.d.food.water;},0)/waterEntries.length*10)/10:0;
  var weightEntries=rangeDays.filter(function(d){return d.d.weight;});
  var weightChange=weightEntries.length>=2?Math.round((weightEntries[weightEntries.length-1].d.weight-weightEntries[0].d.weight)*10)/10:null;

  // Summary stat tiles
  var sg=D('ins-summary-grid');
  function statTile(lbl,val,sub,color){
    var t=D('ins-stat');
    t.appendChild(T('div','ins-stat-lbl',lbl));
    var v=T('div','ins-stat-val',val);if(color)v.style.color=color;
    t.appendChild(v);
    if(sub)t.appendChild(T('div','ins-stat-sub',sub));
    return t;
  }
  ap(sg,
    statTile('Workouts',workoutDays+' / '+n,'days completed',workoutDays/n>=0.5?'var(--gr)':'var(--am)'),
    statTile('Avg calories',avgKcal?avgKcal+'':'--','kcal/day',avgKcal>0&&avgKcal<KT+200?'var(--gr)':'var(--am)'),
    statTile('Avg water',avgWater?avgWater+'L':'--','per day',avgWater>=3.5?'var(--gr)':'var(--am)'),
    statTile('Weight change',weightChange!==null?((weightChange>0?'+':'')+weightChange+'kg'):'--','this range',weightChange===null?'var(--mu)':weightChange<0?'var(--gr)':'var(--re)')
  );
  body.appendChild(sg);

  // Weight trend — line chart
  if(weightEntries.length>=2){
    var wic=D('insight-card');
    wic.appendChild(dottedTitle('Weight trend','var(--weight)'));
    var wPoints=rangeDays.map(function(d){return {y:d.d.weight!==undefined&&d.d.weight!==null?d.d.weight:null};});
    var wChart=D('ins-linechart');
    var wSvg=buildLineChart(wPoints,'#6d5cf2');
    if(wSvg)wChart.appendChild(wSvg);
    wic.appendChild(wChart);
    var wLabels=D('ins-linechart-labels');
    var labelStep=Math.max(1,Math.ceil(n/6));
    rangeDays.forEach(function(d,i){
      if(i%labelStep===0||i===n-1){wLabels.appendChild(T('span','',d.date.getDate()+' '+MS[d.date.getMonth()]));}
    });
    wic.appendChild(wLabels);
    body.appendChild(wic);
  }

  // Calorie trend — line chart against target
  if(kcalEntries.length>=2){
    var cic=D('insight-card');
    cic.appendChild(dottedTitle('Calorie trend','var(--food)'));
    var cPoints=rangeDays.map(function(d){return {y:d.d.food&&d.d.food.kcal?d.d.food.kcal:null};});
    var cChart=D('ins-linechart');
    var allK=cPoints.filter(function(p){return p.y!==null;}).map(function(p){return p.y;}).concat([KT]);
    var cSvg=buildLineChart(cPoints,'#16a34a',0,Math.max.apply(null,allK)*1.1);
    if(cSvg)cChart.appendChild(cSvg);
    cic.appendChild(cChart);
    var cLabels=D('ins-linechart-labels');
    var labelStep2=Math.max(1,Math.ceil(n/6));
    rangeDays.forEach(function(d,i){
      if(i%labelStep2===0||i===n-1){cLabels.appendChild(T('span','',d.date.getDate()+' '+MS[d.date.getMonth()]));}
    });
    cic.appendChild(cLabels);
    var note=T('div','','Target: '+KT+' kcal/day');
    note.style.cssText='font-size:10px;color:var(--mu);margin-top:6px';
    cic.appendChild(note);
    body.appendChild(cic);
  }

  // Workout consistency — bar chart (categorical, not a trend line)
  var tic=D('insight-card');
  tic.appendChild(dottedTitle('Training consistency','var(--accent)'));
  var bars=D('ins-bars');
  var showEveryNth=n>31?Math.ceil(n/31):1;
  rangeDays.forEach(function(d,i){
    if(i%showEveryNth!==0&&i!==n-1)return;
    var st=d.d.training?d.d.training.status:null;
    var col=st==='done'?'var(--accent)':st==='skip'?'var(--rbd)':st==='rest'?'var(--bd)':'var(--fa)';
    var h=st==='done'?100:st==='skip'?55:st==='rest'?35:8;
    var c=D('ins-bar-col');
    var b=D('ins-bar');b.style.cssText='height:'+h+'%;background:'+col;
    c.appendChild(b);
    if(n<=14)c.appendChild(T('div','ins-bar-lbl',d.lbl));
    bars.appendChild(c);
  });
  tic.appendChild(bars);
  if(n>14){
    var legend=T('div','','Orange = completed, light red = skipped, grey = rest, faint = not logged');
    legend.style.cssText='font-size:10px;color:var(--mu);margin-top:8px;line-height:1.5';
    tic.appendChild(legend);
  }
  body.appendChild(tic);

  // Tips — generalized to whatever range is selected
  var tips=D('insight-card');
  var rangeLbl=insRange==='7d'?'this week':insRange==='30d'?'this month':insRange==='year'?'this year':'this range';
  tips.appendChild(T('div','ic-title','Summary'));
  if(workoutDays===0)tips.appendChild(T('div','ic-row','No workouts logged '+rangeLbl+'. Even one session makes a difference.'));
  else if(workoutDays/n<0.4)tips.appendChild(T('div','ic-row',workoutDays+' workout days '+rangeLbl+' — aim for more consistency.'));
  else tips.appendChild(T('div','ic-row','Good workout consistency '+rangeLbl+'.'));
  if(avgKcal>0&&avgKcal<1200)tips.appendChild(T('div','ic-row','Average calories very low ('+avgKcal+'). Stress can suppress appetite — try to eat more.'));
  if(avgWater>0&&avgWater<3)tips.appendChild(T('div','ic-row','Average water only '+avgWater+'L. Try to hit 4L daily.'));
  if(foodDays<n*0.5)tips.appendChild(T('div','ic-row','Food logged on '+foodDays+' of '+n+' days — more consistent logging gives clearer insights.'));
  body.appendChild(tips);
}

function showToast(msg){var t=document.getElementById('tst');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}

document.getElementById('py').addEventListener('click',function(){cy--;renderCal();});
document.getElementById('pm').addEventListener('click',function(){cm--;if(cm<0){cm=11;cy--;}renderCal();});
document.getElementById('nm').addEventListener('click',function(){cm++;if(cm>11){cm=0;cy++;}renderCal();});
document.getElementById('ny').addEventListener('click',function(){cy++;renderCal();});
document.getElementById('menu-btn').addEventListener('click',goMenu);
document.getElementById('cal-insights-btn').appendChild(svgIcon(MENU_ICONS.insights,17));
document.getElementById('cal-insights-btn').addEventListener('click',goInsights);
document.getElementById('cal-logout-btn').appendChild(svgIcon(MENU_ICONS.logout,17));
document.getElementById('cal-logout-btn').addEventListener('click',function(){
  auth.signOut().then(function(){
    localStorage.removeItem('dash_apikey');
    anthropicKey=null;AD={};
    showLoginEntry();
  });
});

var anthropicKey = null;

function showSettings() {
  var loginContent = document.getElementById('login-content');
  if (!loginContent) return;
  goScreen('s-login');
  revealLoginForm();
  loginContent.innerHTML = '';
  var backBtn = document.getElementById('login-box-back');
  if (backBtn) backBtn.style.display = 'flex';
  var user = auth.currentUser;
  loginContent.appendChild(T('div', 'login-title', 'AI Settings'));
  loginContent.appendChild(T('div', 'login-sub', 'Your Anthropic API key powers AI food lookup' + (user ? (' for ' + user.email) : '') + '.'));
  var keyIn = E('input', 'login-input');
  keyIn.placeholder = 'Anthropic API key (sk-ant-...)';
  keyIn.type = 'password';
  keyIn.value = anthropicKey || '';
  loginContent.appendChild(keyIn);
  loginContent.appendChild(Btn('btn', 'Save API key', function() {
    var key = keyIn.value.trim();
    anthropicKey = key;
    localStorage.setItem('dash_apikey', key);
    if (user) {
      db.collection('users').doc(user.uid).set({ apikey: key }, {merge:true}).then(function() {
        showToast('API key saved');goScreen('s-cal');
      }).catch(function() { showToast('Saved locally'); goScreen('s-cal'); });
    } else { showToast('Saved'); goScreen('s-cal'); }
  }));
}

// ── AUTH STATE ────────────────────────────────────────────────────────────
// Firebase fires this once on load (with the persisted user, if any) and
// again on every sign-in / sign-out. This is the single source of truth —
// no more manually checking localStorage for a stored PIN.
// If Firebase Auth (or the Firestore read that follows it) genuinely hangs
// — cold start, flaky connection — don't leave the user staring at a
// spinner with no way out. After 6 seconds, reveal a message and a manual
// reload option. Cleared only once the screen actually changes away from
// the loading state, whether that's the calendar or the sign-in form.
var authTimeoutId = setTimeout(function() {
  var slow = document.getElementById('auth-slow-msg');
  if (slow) slow.style.display = 'block';
}, 6000);

var retryBtn = document.getElementById('auth-slow-retry');
if (retryBtn) retryBtn.addEventListener('click', function() { location.reload(); });

auth.onAuthStateChanged(function(user) {
  if (user) {
    db.collection('users').doc(user.uid).get().then(function(doc) {
      anthropicKey = (doc.exists && doc.data().apikey) ? doc.data().apikey : null;
      clearTimeout(authTimeoutId);
      seedAndLoad();
    }).catch(function() {
      clearTimeout(authTimeoutId);
      seedAndLoad();
    });
  } else {
    clearTimeout(authTimeoutId);
    AD = {};
    showLoginEntry();
  }
});

function authErrorMessage(e) {
  var map = {
    'auth/invalid-email': 'That email looks invalid.',
    'auth/user-not-found': 'No account with that email.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/invalid-credential': 'Wrong email or password.',
    'auth/invalid-login-credentials': 'Wrong email or password.',
    'auth/user-disabled': 'This account is disabled.',
    'auth/email-already-in-use': 'Account already exists.',
    'auth/weak-password': 'Password needs 6+ characters.',
    'auth/too-many-requests': 'Too many attempts — try later.',
    'auth/network-request-failed': 'Network error — check connection.'
  };
  // Never let a raw Firebase error string reach the UI, even for codes we
  // haven't explicitly mapped — fall back to a generic, still-readable message.
  return map[e.code] || 'Sign in failed — try again.';
}

function revealLoginForm() {
  var loading = document.getElementById('auth-loading');
  var formWrap = document.getElementById('login-form-wrap');
  if (loading) loading.style.display = 'none';
  if (formWrap) formWrap.style.display = 'block';
}

function showLoginEntry() {
  revealLoginForm();
  var box = document.getElementById('login-content');
  box.innerHTML = '';
  var backBtn = document.getElementById('login-box-back');
  if (backBtn) backBtn.style.display = 'none';
  box.appendChild(T('div', 'login-title', 'Welcome back'));
  box.appendChild(T('div', 'login-sub', 'Sign in to continue'));

  var emailIn = E('input', 'login-input');
  emailIn.type = 'email';
  emailIn.placeholder = 'Email';
  emailIn.autocomplete = 'email';
  box.appendChild(emailIn);

  var pwIn = E('input', 'login-input');
  pwIn.type = 'password';
  pwIn.placeholder = 'Password';
  pwIn.autocomplete = 'current-password';
  box.appendChild(pwIn);

  function attemptLogin() {
    var email = emailIn.value.trim();
    var pw = pwIn.value;
    if (!email || !pw) { showToastOnLogin('Enter your email and password'); return; }
    signInBtn.textContent = 'Signing in...';
    auth.signInWithEmailAndPassword(email, pw).catch(function(e) {
      signInBtn.textContent = 'Sign in';
      showToastOnLogin(authErrorMessage(e));
    });
  }
  pwIn.addEventListener('keydown', function(e) { if (e.key === 'Enter') attemptLogin(); });

  var signInBtn = Btn('btn', 'Sign in', attemptLogin);
  box.appendChild(signInBtn);

  var forgotBtn = E('button', 'login-link');
  forgotBtn.textContent = 'Forgot password?';
  forgotBtn.addEventListener('click', function() {
    var email = emailIn.value.trim();
    if (!email) { showToastOnLogin('Enter your email first, then tap this again'); return; }
    auth.sendPasswordResetEmail(email).then(function() {
      showToastOnLogin('Password reset email sent', 'success');
    }).catch(function(e) { showToastOnLogin(authErrorMessage(e)); });
  });
  box.appendChild(forgotBtn);

  var newBtn = E('button', 'login-link');
  newBtn.textContent = 'New here? Create an account';
  newBtn.addEventListener('click', showLoginSetup);
  box.appendChild(newBtn);
}

function showLoginSetup() {
  var box = document.getElementById('login-content');
  box.innerHTML = '';
  box.appendChild(T('div', 'login-title', 'Create your account'));
  box.appendChild(T('div', 'login-sub', 'Sign up with your email to get started'));

  var emailIn = E('input', 'login-input');
  emailIn.type = 'email';
  emailIn.placeholder = 'Email';
  emailIn.autocomplete = 'email';
  box.appendChild(emailIn);

  var pwIn = E('input', 'login-input');
  pwIn.type = 'password';
  pwIn.placeholder = 'Password (min 6 characters)';
  pwIn.autocomplete = 'new-password';
  box.appendChild(pwIn);

  var pwConfirmIn = E('input', 'login-input');
  pwConfirmIn.type = 'password';
  pwConfirmIn.placeholder = 'Confirm password';
  pwConfirmIn.autocomplete = 'new-password';
  box.appendChild(pwConfirmIn);

  function attemptSignup() {
    var email = emailIn.value.trim();
    var pw = pwIn.value;
    var pw2 = pwConfirmIn.value;
    if (!email || !pw) { showToastOnLogin('Enter an email and password'); return; }
    if (pw !== pw2) { showToastOnLogin('Passwords do not match'); return; }
    if (pw.length < 6) { showToastOnLogin('Password must be at least 6 characters'); return; }
    signUpBtn.textContent = 'Creating account...';
    auth.createUserWithEmailAndPassword(email, pw).then(function(cred) {
      return db.collection('users').doc(cred.user.uid).set({ email: email, created: new Date().toISOString() }, {merge:true});
    }).catch(function(e) {
      signUpBtn.textContent = 'Create account';
      showToastOnLogin(authErrorMessage(e));
    });
  }
  pwConfirmIn.addEventListener('keydown', function(e) { if (e.key === 'Enter') attemptSignup(); });

  var signUpBtn = Btn('btn', 'Create account', attemptSignup);
  box.appendChild(signUpBtn);

  var back = E('button', 'login-link');
  back.textContent = 'Already have an account? Sign in';
  back.addEventListener('click', showLoginEntry);
  box.appendChild(back);
}

function showToastOnLogin(msg, type) {
  // Login feedback renders inline, right under the form, instead of as a
  // floating toast — the login screen has no bottom nav for a toast to sit
  // near, so a floating message just ends up stranded in empty dark space.
  var box = document.getElementById('login-content');
  if (!box) return;
  var existing = document.getElementById('login-err');
  if (existing) existing.remove();
  var isSuccess = type === 'success';
  var err = T('div', '', msg);
  err.id = 'login-err';
  err.style.cssText = 'margin-top:10px;padding:10px 12px;border-radius:9px;font-size:12px;font-weight:600;text-align:center;line-height:1.4;'
    + (isSuccess
      ? 'background:var(--gbg);color:var(--gr);border:0.5px solid var(--gbd)'
      : 'background:var(--rbg);color:var(--re);border:0.5px solid var(--rbd)');
  box.appendChild(err);
}


// Loads this user's existing days and opens today's view.
function seedAndLoad(){
  var ref=daysRef();
  if(!ref)return;
  ref.get().then(function(snap){
    snap.forEach(function(d){AD[d.id]=d.data();});
    sd=todayKey();
    renderCal();
    goScreen('s-cal');
  }).catch(function(e){console.error(e);renderCal();goScreen('s-cal');});
}
