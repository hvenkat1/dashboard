<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Dashboard</title>
<style>
:root{
  --bg:#f4f3f0;--surface:#fff;--s2:#f9f8f6;
  --border:#e8e6e1;--text:#1a1a18;--muted:#888784;--faint:#d0cec8;
  --green:#2a6029;--gbg:#eaf3e8;--gbd:#b5d4b2;
  --amber:#7a4a00;--abg:#fef4e2;--abd:#f0c878;
  --red:#7a1e1e;--rbg:#fdeaea;--rbd:#eea8a8;
  --blue:#1a3f7a;--bbg:#e8f0fc;--bbd:#a0bcec;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;padding-bottom:40px}

/* HEADER */
.hdr{background:var(--text);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:99}
.hdr h1{font-size:16px;font-weight:600;letter-spacing:-.2px}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}

/* PAGE */
.page{max-width:600px;margin:0 auto;padding:14px 12px 60px}

/* CALENDAR */
.cal-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--border)}
.cal-nav-row h2{font-size:15px;font-weight:600}
.cal-navs{display:flex;gap:6px}
.cnav{background:none;border:0.5px solid var(--border);border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:15px;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.yr-sel{font-size:13px;font-weight:600;background:var(--bg);border:0.5px solid var(--border);border-radius:7px;padding:4px 8px;color:var(--text);cursor:pointer;outline:none}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 10px 4px}
.cal-dow div{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:4px 10px 12px}
.cc{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:0.5px solid transparent;position:relative;transition:background .1s}
.cc:hover{background:var(--s2)}
.cc.today{border-color:var(--text)}
.cc.sel{background:var(--text)}
.cc.sel .cn{color:#fff}
.cc.om .cn{color:var(--faint)}
.cn{font-size:13px;font-weight:500}
.cdots{display:flex;gap:2px;margin-top:2px;height:5px;align-items:center}
.cdot{width:4px;height:4px;border-radius:50%}

/* DAY PANEL */
.day-panel{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.dp-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:0.5px solid var(--border);background:var(--s2)}
.dp-date{font-size:15px;font-weight:700}
.dp-phase{font-size:10px;color:var(--muted);margin-top:2px}
.dp-body{padding:14px}

/* SECTION LABEL */
.slbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px}
.slbl:first-child{margin-top:0}

/* TRAINING ROW */
.t-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.t-name{font-size:13px;font-weight:600}
.t-phase{font-size:10px;color:var(--muted);margin-top:1px}

/* STATUS BUTTONS */
.st-row{display:flex;gap:6px;margin-bottom:12px}
.stb{flex:1;padding:8px 4px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg);font-size:11px;font-weight:600;cursor:pointer;text-align:center;color:var(--muted);transition:all .12s}
.stb.on.done{background:var(--gbg);color:var(--green);border:1.5px solid var(--green)}
.stb.on.skip{background:var(--rbg);color:var(--red);border:1.5px solid var(--red)}
.stb.on.rest{background:var(--bg);color:var(--text);border:1.5px solid var(--text)}

/* EXERCISE LIST */
.ex-list{border-top:0.5px solid var(--border);padding-top:8px}
.ex-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-n{font-size:11px}
.ex-s{font-size:11px;color:var(--muted)}

/* WATCH INPUTS */
.watch-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px}
.wf label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}
.wf input,.wf select{width:100%;padding:7px 8px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;background:var(--bg);color:var(--text);outline:none}
.wf input:focus,.wf select:focus{border-color:var(--text)}

/* METRICS */
.met-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.mcard{background:var(--s2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px}
.mc-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.mc-val{font-size:20px;font-weight:600;line-height:1}
.mc-sub{font-size:10px;color:var(--muted);margin-top:3px}
.pbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.pfill{height:4px;border-radius:2px;transition:width .3s}
.ppill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:7px;margin-top:4px}

/* MEAL CARDS */
.meal{background:var(--s2);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden}
.m-hdr{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:0.5px solid var(--border)}
.m-nm{font-size:12px;font-weight:600}
.m-kc{font-size:11px;font-weight:600;color:var(--blue)}
.m-body{padding:4px 12px}
.mi{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--border);align-items:center}
.mi:last-child{border-bottom:none}
.mi-n{font-size:11px;flex:1}
.mi-k{font-size:11px;color:var(--muted)}
.mi-del{font-size:15px;color:var(--faint);background:none;border:none;cursor:pointer;padding:0 0 0 8px;line-height:1}

/* FLAGS */
.flags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.flag{font-size:10px;font-weight:500;padding:3px 9px;border-radius:10px;border:0.5px solid}
.fg{background:var(--gbg);color:var(--green);border-color:var(--gbd)}
.fw{background:var(--abg);color:var(--amber);border-color:var(--abd)}
.fi{background:var(--bbg);color:var(--blue);border-color:var(--bbd)}

/* ADD FOOD */
.add-food{background:var(--s2);border:0.5px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px}
.af-row{display:grid;grid-template-columns:2fr 1fr auto;gap:6px;align-items:end;margin-top:8px}
.af-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}
.af-in{width:100%;padding:8px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:13px;background:var(--surface);color:var(--text);outline:none}
.af-in:focus{border-color:var(--text)}
.af-sel{width:100%;padding:8px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;background:var(--surface);color:var(--text);outline:none}
.add-btn-sm{padding:8px 12px;background:var(--text);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;height:35px;white-space:nowrap}
.cur-items{margin-top:8px}

/* WATER */
.water-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.wb{padding:6px 12px;border:0.5px solid var(--border);border-radius:8px;background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)}
.wb.on{background:var(--bbg);color:var(--blue);border-color:var(--bbd)}

/* PROTEIN */
.prot-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.pb2{padding:6px 12px;border:0.5px solid var(--border);border-radius:8px;background:var(--bg);font-size:11px;font-weight:600;cursor:pointer;color:var(--muted)}
.pb2.on{border-width:1.5px}

/* CAFFEINE */
.caff-in{width:100%;padding:8px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:13px;background:var(--bg);color:var(--text);outline:none;margin-top:6px}
.caff-in:focus{border-color:var(--text)}

/* DIVIDER */
.div{height:0.5px;background:var(--border);margin:14px 0}

/* BUTTONS */
.btn{width:100%;padding:11px;background:var(--text);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{opacity:.8}
.btn-out{background:var(--surface);color:var(--text);border:0.5px solid var(--border)}
.btn-red{background:var(--rbg);color:var(--red);border:0.5px solid var(--rbd);font-size:11px;padding:6px 12px;border-radius:7px;cursor:pointer;width:auto;margin:0}

/* KCAL BAR */
.kbar-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.kbar-name{font-weight:600}
.kbar-val{color:var(--muted)}

/* EMPTY */
.empty{text-align:center;padding:18px;color:var(--muted);font-size:12px;background:var(--s2);border:0.5px dashed var(--faint);border-radius:var(--r);line-height:1.7}

/* BADGE */
.badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:12px;white-space:nowrap;border:0.5px solid}
.bd{background:var(--gbg);color:var(--green);border-color:var(--gbd)}
.bs{background:var(--rbg);color:var(--red);border-color:var(--rbd)}
.br{background:var(--bg);color:var(--muted);border-color:var(--border)}
.bp{background:var(--bbg);color:var(--blue);border-color:var(--bbd)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* EDIT TOGGLE */
.edit-toggle{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;font-weight:600;padding:0}

/* COLLAPSED SUMMARY */
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border)}
.summary-row:last-child{border-bottom:none}
.sr-lbl{font-size:12px;color:var(--muted)}
.sr-val{font-size:12px;font-weight:600}
</style>
</head>
<body>

<div class="hdr">
  <h1>My Dashboard</h1>
  <div class="hdr-sub">Training + nutrition tracker</div>
</div>

<div class="page">

  <!-- CALENDAR -->
  <div class="cal-wrap">
    <div class="cal-nav-row">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="cnav" id="prev-month">&#8249;</button>
        <h2 id="cal-month-lbl"></h2>
        <button class="cnav" id="next-month">&#8250;</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="cnav" id="prev-year">&#8249;&#8249;</button>
        <select class="yr-sel" id="yr-select"></select>
        <button class="cnav" id="next-year">&#8250;&#8250;</button>
      </div>
    </div>
    <div class="cal-dow">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- DAY PANEL -->
  <div id="dayPanel"></div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,setDoc,getDoc,getDocs,collection}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fb=initializeApp({apiKey:"AIzaSyAnMjUc_j-GE5kJG-5SRx-QStUMIYTQPiU",authDomain:"diet-and-training-dashboard.firebaseapp.com",projectId:"diet-and-training-dashboard",storageBucket:"diet-and-training-dashboard.firebasestorage.app",messagingSenderId:"10655379210",appId:"1:10655379210:web:c3b1b5806588e929e3d4f3"});
const db=getFirestore(fb);

// ── CONSTANTS ─────────────────────────────────────────────────────────────
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MSHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DSHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const KT=1800,WT=4,CT=300;
const PLAN_START=new Date('2025-06-30');

// ── PLAN ──────────────────────────────────────────────────────────────────
const P14=[
  {type:'walk',name:'Treadmill Walk',phase:'Phase 1 · Wk 1–4',ex:[{n:'Flat walk warm-up',s:'5 min · 4 km/h · 0%'},{n:'Incline walk',s:'50 min · 5 km/h · 8%'},{n:'Flat walk cool-down',s:'5 min · 4 km/h · 0%'}]},
  {type:'str',name:'Strength A – Lower + Glutes',phase:'Phase 1 · Wk 1–4',ex:[{n:'Glute bridge',s:'2×15 · BW'},{n:'Clamshell',s:'2×15/side · BW'},{n:'Tibialis raise ⭐',s:'2×20 · BW'},{n:'Leg press',s:'4×12 · Light-moderate'},{n:'Leg curl',s:'3×12 · Moderate'},{n:'DB Romanian deadlift',s:'3×10 · 10 kg'},{n:'DB reverse lunge',s:'3×10/leg · 7.5 kg'},{n:'Single-leg glute bridge',s:'3×10/side · BW'},{n:'Seated calf raise',s:'3×15 · 10 kg'},{n:'Tibialis raise ⭐',s:'3×20 · BW'}]},
  {type:'walk',name:'Treadmill Walk',phase:'Phase 1 · Wk 1–4',ex:[{n:'Incline walk',s:'60 min · 5 km/h · 8%'}]},
  {type:'rest',name:'Rest Day',phase:'Phase 1 · Wk 1–4',ex:[]},
  {type:'walk',name:'Treadmill Walk',phase:'Phase 1 · Wk 1–4',ex:[{n:'Incline walk',s:'60 min · 5 km/h · 8%'}]},
  {type:'str',name:'Strength B – Upper + Core',phase:'Phase 1 · Wk 1–4',ex:[{n:'Dead bug',s:'2×8/side · BW'},{n:'DB bent-over row',s:'4×10 · 12.5 kg'},{n:'DB floor press',s:'3×12 · 12.5 kg'},{n:'DB shoulder press',s:'3×10 · 10 kg'},{n:'DB bicep curl',s:'3×12 · 10 kg'},{n:'Plank',s:'3×35 sec'},{n:'Side plank',s:'3×20 sec/side'},{n:'DB Russian twist',s:'3×12/side · 5 kg'}]},
  {type:'rest',name:'Rest Day',phase:'Phase 1 · Wk 1–4',ex:[]},
];
const P58=[
  {type:'walk',name:'Treadmill Walk',phase:'Phase 1 · Wk 5–8',ex:[{n:'Incline walk',s:'60 min · 5.5 km/h · 8%'}]},
  {type:'str',name:'Strength A – Lower + Glutes',phase:'Phase 1 · Wk 5–8',ex:[{n:'Glute bridge',s:'2×15 · BW'},{n:'Clamshell',s:'2×15/side · BW'},{n:'Tibialis raise ⭐',s:'2×20–25 · BW'},{n:'Leg press',s:'4×12 · Heavier'},{n:'Leg curl',s:'3×12 · Progressive'},{n:'DB Romanian deadlift',s:'3×10 · 12.5 kg'},{n:'DB reverse lunge',s:'3×10/leg · 10 kg'},{n:'Single-leg glute bridge',s:'3×12/side · BW/5 kg'},{n:'Seated calf raise',s:'3×15 · 12.5 kg'},{n:'Tibialis raise ⭐',s:'3×25 · BW'}]},
  {type:'walk',name:'Treadmill Walk',phase:'Phase 1 · Wk 5–8',ex:[{n:'Incline walk',s:'60 min · 5.5 km/h · 8%'}]},
  {type:'rest',name:'Rest Day',phase:'Phase 1 · Wk 5–8',ex:[]},
  {type:'walk',name:'Treadmill Walk',phase:'Phase 1 · Wk 5–8',ex:[{n:'Incline walk',s:'60 min · 5.5 km/h · 8%'}]},
  {type:'str',name:'Strength B – Upper + Core',phase:'Phase 1 · Wk 5–8',ex:[{n:'Dead bug',s:'2×10/side · BW'},{n:'DB bent-over row',s:'4×10 · 15 kg'},{n:'DB floor press',s:'3×12 · 15 kg'},{n:'DB shoulder press',s:'3×10 · 12.5 kg'},{n:'DB bicep curl',s:'3×12 · 12.5 kg'},{n:'Plank',s:'3×45 sec'},{n:'Side plank',s:'3×25 sec/side'},{n:'DB Russian twist',s:'3×12/side · 7.5 kg'}]},
  {type:'rest',name:'Rest Day',phase:'Phase 1 · Wk 5–8',ex:[]},
];

function getPlan(dk){
  const d=new Date(dk+'T12:00:00');
  const diff=Math.round((d-PLAN_START)/86400000);
  if(diff<0)return null;
  const wk=Math.floor(diff/7),dow=diff%7;
  if(wk<4)return P14[dow];
  if(wk<8)return P58[dow];
  const p2=[
    {type:'run',name:'Easy Run – Treadmill',phase:'Phase 2',ex:[{n:'Glute bridge + clamshell',s:'1×15 each · BW'},{n:'Easy treadmill run',s:'5–7 km · 6.5–7 min/km'},{n:'Tibialis raise ⭐',s:'3×20 post-run'}]},
    {type:'str',name:'Strength A – Lower + Glutes',phase:'Phase 2',ex:[{n:'Glute bridge + clamshell',s:'2×15 · BW'},{n:'Leg press',s:'4×12 · Heavy'},{n:'Leg curl',s:'3×12'},{n:'DB Romanian deadlift',s:'3×10 · 12.5–15 kg'},{n:'DB reverse lunge',s:'3×10/leg · 10 kg'},{n:'Single-leg glute bridge',s:'3×12/side · 5–7.5 kg'},{n:'Tibialis raise ⭐',s:'3×25 · BW'}]},
    {type:'walk',name:'Treadmill Walk – Recovery',phase:'Phase 2',ex:[{n:'Incline walk',s:'50 min · 5 km/h · 8%'}]},
    {type:'tempo',name:'Tempo Run – Treadmill',phase:'Phase 2',ex:[{n:'Warm-up jog',s:'5 min easy'},{n:'Tempo run',s:'5 km · 5.5–6 min/km'},{n:'Tibialis raise ⭐',s:'3×25 post-run'}]},
    {type:'rest',name:'Rest Day',phase:'Phase 2',ex:[]},
    {type:'run',name:'Long Run – Road',phase:'Phase 2',ex:[{n:'Pre-run: glute bridge + clamshell',s:'2×15 each · BW'},{n:'Road long run',s:'10–12 km · 7 min/km'},{n:'Tibialis raise ⭐',s:'3×25 post-run'},{n:'Calf stretch',s:'2×60 sec/leg'}]},
    {type:'rest',name:'Rest Day',phase:'Phase 2',ex:[]},
  ];
  return p2[dow];
}

// ── STATE ─────────────────────────────────────────────────────────────────
function todayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

let selDate=todayKey();
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();
let allData={};
let editTraining=false;
let editFood=false;
let tmpMealItems=[];
let tmpMeals=[];
let tmpWater=0;
let tmpProtein='';
let tmpCaff=0;
let tmpStatus='plan';

// ── FIREBASE ──────────────────────────────────────────────────────────────
async function loadAll(){
  try{const snap=await getDocs(collection(db,'days'));snap.forEach(d=>{allData[d.id]=d.data();});}catch(e){console.error(e);}
  renderAll();
}
async function saveDay(dk,data){
  try{
    await setDoc(doc(db,'days',dk),data,{merge:true});
    allData[dk]={...(allData[dk]||{}),...data};
    toast('Saved');renderAll();
  }catch(e){toast('Save failed');console.error(e);}
}

// ── YEAR SELECT ───────────────────────────────────────────────────────────
function buildYearSelect(){
  const sel=document.getElementById('yr-select');
  sel.innerHTML='';
  for(let y=2025;y<=2027;y++){
    const o=document.createElement('option');
    o.value=y;o.textContent=y;
    if(y===calYear)o.selected=true;
    sel.appendChild(o);
  }
  sel.onchange=()=>{calYear=parseInt(sel.value);renderCalendar();};
}

// ── CALENDAR ──────────────────────────────────────────────────────────────
function renderCalendar(){
  document.getElementById('cal-month-lbl').textContent=MONTHS[calMonth];
  buildYearSelect();
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  const today=todayKey();
  const first=new Date(calYear,calMonth,1);
  const startDow=first.getDay();
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const prevDim=new Date(calYear,calMonth,0).getDate();

  for(let i=0;i<42;i++){
    let day,mo,yr,inM=true;
    if(i<startDow){day=prevDim-startDow+i+1;mo=calMonth-1;yr=calYear;if(mo<0){mo=11;yr--;}inM=false;}
    else if(i>=startDow+dim){day=i-startDow-dim+1;mo=calMonth+1;yr=calYear;if(mo>11){mo=0;yr++;}inM=false;}
    else{day=i-startDow+1;mo=calMonth;yr=calYear;}
    const dk=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const d=allData[dk];
    let dots='';
    if(d?.training?.status==='done')dots+='<div class="cdot" style="background:var(--green)"></div>';
    if(d?.food?.meals?.length)dots+='<div class="cdot" style="background:var(--blue)"></div>';
    const el=document.createElement('div');
    el.className='cc'+(dk===selDate?' sel':'')+(dk===today?' today':'')+(inM?'':' om');
    el.innerHTML=`<div class="cn">${day}</div><div class="cdots">${dots}</div>`;
    el.onclick=()=>{selDate=dk;calYear=yr;calMonth=mo;editTraining=false;editFood=false;tmpMealItems=[];renderAll();};
    grid.appendChild(el);
  }
}

// ── DAY PANEL ─────────────────────────────────────────────────────────────
function renderDay(){
  const panel=document.getElementById('dayPanel');
  const d=allData[selDate]||{};
  const plan=getPlan(selDate);
  const dateObj=new Date(selDate+'T12:00:00');
  const dateLabel=`${DSHORT[dateObj.getDay()]}, ${dateObj.getDate()} ${MSHORT[dateObj.getMonth()]} ${dateObj.getFullYear()}`;

  let h=`<div class="day-panel">
    <div class="dp-hdr">
      <div>
        <div class="dp-date">${dateLabel}</div>
        <div class="dp-phase">${plan?.phase||'Before plan start'}</div>
      </div>
    </div>
    <div class="dp-body">`;

  // ── TRAINING SECTION ──
  h+=`<div class="slbl">Training</div>`;

  if(!plan){
    h+=`<div class="empty">No workout planned for this date.</div>`;
  } else if(!editTraining && d.training?.status && d.training.status!=='plan'){
    // SAVED VIEW
    const stMap={done:{cls:'bd',lbl:'Completed'},skip:{cls:'bs',lbl:'Skipped'},rest:{cls:'br',lbl:'Rest day'},plan:{cls:'bp',lbl:'Planned'}};
    const st=d.training.status||'plan';
    h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div><div class="t-name">${d.training.name||plan.name}</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge ${stMap[st].cls}">${stMap[st].lbl}</span>
        <button class="edit-toggle" onclick="startEditTraining()">Edit</button>
      </div>
    </div>`;
    if(st==='done'&&(d.training.kcal||d.training.hr||d.training.effort)){
      h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px">
        <div class="mcard" style="text-align:center"><div class="mc-lbl">Kcal burned</div><div style="font-size:16px;font-weight:600">${d.training.kcal||'—'}</div></div>
        <div class="mcard" style="text-align:center"><div class="mc-lbl">Heart rate</div><div style="font-size:13px;font-weight:600">${d.training.hr||'—'}</div></div>
        <div class="mcard" style="text-align:center"><div class="mc-lbl">Effort</div><div style="font-size:12px;font-weight:600">${d.training.effort||'—'}</div></div>
      </div>`;
    }
    if(plan.ex?.length){
      h+=`<div class="ex-list">`;
      plan.ex.forEach(e=>{h+=`<div class="ex-row"><span class="ex-n">${e.n}</span><span class="ex-s">${e.s}</span></div>`;});
      h+=`</div>`;
    }
  } else {
    // EDIT VIEW
    h+=`<div style="margin-bottom:8px"><div class="t-name">${plan.name}</div></div>`;
    if(plan.ex?.length){
      h+=`<div class="ex-list" style="margin-bottom:12px">`;
      plan.ex.forEach(e=>{h+=`<div class="ex-row"><span class="ex-n">${e.n}</span><span class="ex-s">${e.s}</span></div>`;});
      h+=`</div>`;
    }
    const cs=d.training?.status||(plan.type==='rest'?'rest':'plan');
    h+=`<div class="st-row">
      <div class="stb done${cs==='done'?' on':''}" onclick="setTmpStatus('done')">Completed</div>
      <div class="stb skip${cs==='skip'?' on':''}" onclick="setTmpStatus('skip')">Skipped</div>
      <div class="stb rest${cs==='rest'?' on':''}" onclick="setTmpStatus('rest')">Rest day</div>
    </div>
    <div id="watch-section"></div>
    <button class="btn" onclick="saveTraining()">Save training</button>`;
    tmpStatus=cs;
    setTimeout(()=>renderWatchSection(),10);
  }

  h+=`<div class="div"></div>`;

  // ── FOOD SECTION ──
  h+=`<div class="slbl">Food</div>`;
  const f=d.food||{};
  const meals=f.meals||[];
  const totalK=meals.reduce((a,m)=>a+(m.kcal||0),0);

  if(!editFood && meals.length){
    // SAVED VIEW
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:600">${totalK} kcal logged</div>
      <button class="edit-toggle" onclick="startEditFood()">Edit</button>
    </div>`;

    // Metrics
    const kp=Math.min(100,Math.round(totalK/KT*100));
    const wp=Math.min(100,Math.round((f.water||0)/WT*100));
    const cp=Math.min(100,Math.round((f.caffeine||0)/CT*100));
    function kc(p){return p<40?'#c0392b':p<75?'#a06000':'#2a6029';}
    function wc(p){return p<50?'#c0392b':p<85?'#a06000':'#2a6029';}
    function cc(p){return p>110?'#c0392b':p>85?'#a06000':'#2a6029';}

    h+=`<div class="met-grid">
      <div class="mcard"><div class="mc-lbl">Calories</div><div class="mc-val" style="color:${kc(kp)}">${totalK}<span style="font-size:11px;font-weight:400;color:var(--muted)"> / ${KT}</span></div><div class="pbar"><div class="pfill" style="width:${kp}%;background:${kc(kp)}"></div></div><div class="mc-sub">${KT-totalK>0?(KT-totalK)+' kcal to go':'Target reached'}</div></div>
      <div class="mcard"><div class="mc-lbl">Water</div><div class="mc-val" style="color:${wc(wp)}">${f.water||0}L<span style="font-size:11px;font-weight:400;color:var(--muted)"> / ${WT}L</span></div><div class="pbar"><div class="pfill" style="width:${wp}%;background:${wc(wp)}"></div></div><div class="mc-sub">${WT-(f.water||0)>0?(WT-f.water)+'L to go':'Target reached'}</div></div>
      <div class="mcard"><div class="mc-lbl">Caffeine</div><div class="mc-val" style="color:${cc(cp)}">${f.caffeine||0}<span style="font-size:11px;font-weight:400;color:var(--muted)"> mg</span></div><div class="pbar"><div class="pfill" style="width:${cp}%;background:${cc(cp)}"></div></div><div class="mc-sub">${(f.caffeine||0)>CT?'Over limit — affects sleep':'Within limit'}</div></div>
      <div class="mcard"><div class="mc-lbl">Protein</div>${proteinPill(f.protein)}</div>
    </div>`;

    // Meal breakdown
    meals.forEach(m=>{
      const mp=Math.min(100,Math.round((m.kcal||0)/KT*100));
      h+=`<div style="margin-bottom:10px">
        <div class="kbar-row"><span class="kbar-name">${m.name}</span><span class="kbar-val">${m.kcal} kcal (${mp}%)</span></div>
        <div class="pbar"><div class="pfill" style="width:${mp}%;background:var(--blue)"></div></div>`;
      if(m.items?.length){
        h+=`<div class="meal" style="margin-top:4px"><div class="m-body">`;
        m.items.forEach(i=>{h+=`<div class="mi"><span class="mi-n">${i.n}</span><span class="mi-k">${i.k} kcal</span></div>`;});
        h+=`</div></div>`;
      }
      h+=`</div>`;
    });

    // Auto flags
    const flags=autoFlags(f,totalK);
    h+=`<div class="flags">`;
    flags.forEach(fl=>{h+=`<span class="flag ${fl.c}">${fl.t}</span>`;});
    h+=`</div>`;

  } else {
    // EDIT FOOD VIEW
    tmpMeals=meals.length?JSON.parse(JSON.stringify(meals)):[];
    tmpWater=f.water||0;
    tmpProtein=f.protein||'';
    tmpCaff=f.caffeine||0;

    // Add meal form
    h+=`<div class="add-food">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
        <div><label class="af-lbl">Meal name</label><input class="af-in" id="af-meal-name" placeholder="e.g. Lunch"></div>
        <div><label class="af-lbl">Type</label><select class="af-sel" id="af-meal-type"><option>Breakfast</option><option selected>Lunch</option><option>Dinner</option><option>Snack</option><option>Drinks</option></select></div>
      </div>
      <div id="tmp-items-list"></div>
      <div class="af-row">
        <div><label class="af-lbl">Food item</label><input class="af-in" id="af-item-name" placeholder="e.g. 400g rice" onkeydown="if(event.key==='Enter'){event.preventDefault();window._addItem();}"></div>
        <div><label class="af-lbl">Kcal</label><input class="af-in" id="af-item-kcal" type="number" placeholder="520" onkeydown="if(event.key==='Enter'){event.preventDefault();window._addItem();}"></div>
        <button class="add-btn-sm" onclick="window._addItem()">+ Add</button>
      </div>
      <button class="btn" style="margin-top:10px" onclick="window._saveMeal()">Save meal</button>
    </div>`;

    // Saved meals so far
    if(tmpMeals.length){
      h+=`<div style="margin-bottom:8px">`;
      tmpMeals.forEach((m,mi)=>{
        h+=`<div class="meal"><div class="m-hdr"><span class="m-nm">${m.name}</span><span class="m-kc">${m.kcal} kcal</span></div>`;
        if(m.items?.length){
          h+=`<div class="m-body">`;
          m.items.forEach((it,ii)=>{h+=`<div class="mi"><span class="mi-n">${it.n}</span><span class="mi-k">${it.k} kcal</span><button class="mi-del" onclick="window._delMealItem(${mi},${ii})">×</button></div>`;});
          h+=`</div>`;
        }
        h+=`<div style="padding:5px 12px;border-top:0.5px solid var(--border)"><button class="btn-red" onclick="window._delMeal(${mi})">Remove</button></div>`;
        h+=`</div>`;
      });
      h+=`</div>`;
    }

    // Water
    h+=`<div class="slbl">Water intake</div>
    <div class="water-btns" id="water-btns-el">`;
    [0.5,1,1.5,2,2.5,3,3.5,4,4.5,5].forEach(v=>{
      h+=`<button class="wb${tmpWater===v?' on':''}" onclick="window._setWater(${v})">${v}L</button>`;
    });
    h+=`</div>`;

    // Caffeine
    h+=`<div class="slbl">Caffeine (mg)</div>
    <input class="caff-in" id="caff-in" type="number" value="${tmpCaff}" placeholder="e.g. 300 (1 coffee ~90mg, 1 tea ~50mg)">`;

    // Protein
    h+=`<div class="slbl">Protein level</div>
    <div class="prot-btns">`;
    ['Low','Low-moderate','Moderate','Good','High'].forEach(p=>{
      const cols={Low:'var(--rbg)',`Low-moderate`:'var(--abg)',Moderate:'var(--abg)',Good:'var(--gbg)',High:'var(--gbg)'};
      const on=tmpProtein===p;
      h+=`<button class="pb2${on?' on':''}" style="${on?`background:${cols[p]};border-color:var(--text)`:''}" onclick="window._setProtein('${p}')">${p}</button>`;
    });
    h+=`</div>`;

    h+=`<button class="btn" style="margin-top:14px" onclick="window._saveFood()">Save food log</button>`;
    if(meals.length) h+=`<button class="btn btn-out" onclick="cancelEditFood()">Cancel</button>`;
  }

  h+=`</div></div>`;
  panel.innerHTML=h;
  renderTmpItems();
}

function proteinPill(p){
  if(!p)return`<div class="mc-sub" style="margin-top:4px">Not set</div>`;
  const cols={Low:{c:'var(--red)',bg:'var(--rbg)',b:'var(--rbd)'},'Low-moderate':{c:'var(--amber)',bg:'var(--abg)',b:'var(--abd)'},Moderate:{c:'var(--amber)',bg:'var(--abg)',b:'var(--abd)'},Good:{c:'var(--green)',bg:'var(--gbg)',b:'var(--gbd)'},High:{c:'var(--green)',bg:'var(--gbg)',b:'var(--gbd)'}};
  const col=cols[p]||{c:'var(--muted)',bg:'var(--bg)',b:'var(--border)'};
  return`<div class="ppill" style="background:${col.bg};color:${col.c};border:0.5px solid ${col.b}">${p}</div>`;
}

function autoFlags(f,totalK){
  const flags=[];
  if((f.water||0)>=4)flags.push({t:'4L water — great',c:'fg'});
  else if((f.water||0)>=2.5)flags.push({t:`${f.water}L water — nearly there`,c:'fi'});
  else flags.push({t:'Low water intake',c:'fw'});
  if((f.caffeine||0)>300)flags.push({t:'High caffeine — affects sleep',c:'fw'});
  else flags.push({t:'Caffeine within limit',c:'fg'});
  if(!f.protein||f.protein==='Low')flags.push({t:'Low protein — add dal/eggs/paneer',c:'fw'});
  else if(f.protein==='Low-moderate'||f.protein==='Moderate')flags.push({t:'Protein moderate — can improve',c:'fi'});
  else flags.push({t:'Good protein intake',c:'fg'});
  if(totalK<1200)flags.push({t:'Very low calories today',c:'fw'});
  else if(totalK<1500)flags.push({t:'Calories below target',c:'fi'});
  else flags.push({t:'Good calorie intake',c:'fg'});
  return flags;
}

function renderTmpItems(){
  const el=document.getElementById('tmp-items-list');
  if(!el)return;
  if(!tmpMealItems.length){el.innerHTML='';return;}
  let h='<div class="cur-items">';
  tmpMealItems.forEach((it,i)=>{h+=`<div class="mi"><span class="mi-n">${it.n}</span><span class="mi-k">${it.k} kcal</span><button class="mi-del" onclick="window._removeItem(${i})">×</button></div>`;});
  h+='</div>';
  el.innerHTML=h;
}

function renderAll(){renderCalendar();renderDay();}

// ── WINDOW GLOBALS (onclick compatible with module scope) ─────────────────
window.startEditTraining=()=>{editTraining=true;renderDay();};
window.cancelEditFood=()=>{editFood=false;renderDay();};
window.startEditFood=()=>{editFood=true;renderDay();};

window.setTmpStatus=function(s){
  tmpStatus=s;
  document.querySelectorAll('.stb').forEach(b=>{
    b.className='stb '+[...b.classList].find(c=>['done','skip','rest'].includes(c))||'';
    if(b.classList.contains(s))b.classList.add('on');
  });
  renderWatchSection();
};

function renderWatchSection(){
  const el=document.getElementById('watch-section');
  if(!el)return;
  const d=allData[selDate]||{};
  if(tmpStatus==='done'){
    const kcal=d.training?.kcal||'';
    const hr=d.training?.hr||'';
    const eff=d.training?.effort||'';
    el.innerHTML=`<div class="slbl" style="margin-top:10px">Apple Watch stats</div>
    <div class="watch-grid">
      <div class="wf"><label>Kcal burned</label><input id="w-kcal" type="number" placeholder="520" value="${kcal}"></div>
      <div class="wf"><label>Avg HR</label><input id="w-hr" placeholder="135 bpm" value="${hr}"></div>
      <div class="wf"><label>Effort</label><select id="w-eff"><option value="">—</option><option${eff==='Easy'?' selected':''}>Easy</option><option${eff==='Moderate'?' selected':''}>Moderate</option><option${eff==='Hard'?' selected':''}>Hard</option><option${eff==='Very hard'?' selected':''}>Very hard</option></select></div>
    </div>`;
  } else {
    el.innerHTML='';
  }
}

window.saveTraining=async function(){
  const plan=getPlan(selDate);
  const entry={training:{
    name:plan?.name||'',phase:plan?.phase||'',status:tmpStatus,
    exercises:plan?.ex||[],
    kcal:tmpStatus==='done'?(parseInt(document.getElementById('w-kcal')?.value)||null):null,
    hr:tmpStatus==='done'?(document.getElementById('w-hr')?.value||null):null,
    effort:tmpStatus==='done'?(document.getElementById('w-eff')?.value||null):null,
  }};
  editTraining=false;
  await saveDay(selDate,entry);
};

window._addItem=function(){
  const n=document.getElementById('af-item-name').value.trim();
  const k=parseInt(document.getElementById('af-item-kcal').value)||0;
  if(!n){toast('Enter a food name');return;}
  tmpMealItems.push({n,k});
  document.getElementById('af-item-name').value='';
  document.getElementById('af-item-kcal').value='';
  document.getElementById('af-item-name').focus();
  renderTmpItems();
};

window._removeItem=function(i){tmpMealItems.splice(i,1);renderTmpItems();};

window._saveMeal=function(){
  if(!tmpMealItems.length){toast('Add at least one item');return;}
  const nm=document.getElementById('af-meal-name').value.trim()||document.getElementById('af-meal-type').value;
  const kc=tmpMealItems.reduce((a,i)=>a+i.k,0);
  tmpMeals.push({name:nm,kcal:kc,items:[...tmpMealItems]});
  tmpMealItems=[];
  document.getElementById('af-meal-name').value='';
  document.getElementById('af-item-name').value='';
  document.getElementById('af-item-kcal').value='';
  toast(`${nm} saved`);
  renderDay();
};

window._delMeal=function(i){tmpMeals.splice(i,1);renderDay();};
window._delMealItem=function(mi,ii){
  tmpMeals[mi].items.splice(ii,1);
  tmpMeals[mi].kcal=tmpMeals[mi].items.reduce((a,i)=>a+i.k,0);
  renderDay();
};

window._setWater=function(v){
  tmpWater=v;
  document.querySelectorAll('.wb').forEach(b=>{
    b.className='wb'+(parseFloat(b.textContent)===v?' on':'');
  });
};

window._setProtein=function(p){
  tmpProtein=p;
  document.querySelectorAll('.pb2').forEach(b=>{
    const on=b.textContent.trim()===p;
    const cols={'Low':'var(--rbg)','Low-moderate':'var(--abg)','Moderate':'var(--abg)','Good':'var(--gbg)','High':'var(--gbg)'};
    b.className='pb2'+(on?' on':'');
    b.style.background=on?(cols[p]||''):'';
    b.style.borderColor=on?'var(--text)':'';
  });
};

window._saveFood=async function(){
  const caff=parseInt(document.getElementById('caff-in')?.value)||0;
  const totalK=tmpMeals.reduce((a,m)=>a+(m.kcal||0),0);
  const entry={food:{meals:tmpMeals,kcal:totalK,water:tmpWater,caffeine:caff,protein:tmpProtein}};
  editFood=false;
  await saveDay(selDate,entry);
};

// ── CAL BUTTONS ───────────────────────────────────────────────────────────
document.getElementById('prev-month').onclick=()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();};
document.getElementById('next-month').onclick=()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();};
document.getElementById('prev-year').onclick=()=>{calYear--;renderCalendar();};
document.getElementById('next-year').onclick=()=>{calYear++;renderCalendar();};

// ── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── SEED + INIT ───────────────────────────────────────────────────────────

seedOld().then(loadAll);
</script>
