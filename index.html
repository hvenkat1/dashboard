<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Dashboard</title>
<style>
:root{
  --bg:#f2f1ee;--sf:#fff;--s2:#f7f6f4;--bd:#e6e4df;--tx:#181816;--mu:#86847f;--fa:#ccc9c2;
  --gr:#265c25;--gbg:#e8f2e7;--gbd:#aed0ac;
  --am:#7a4800;--abg:#fef2df;--abd:#f0c070;
  --re:#7a1c1c;--rbg:#fde8e8;--rbd:#eca8a8;
  --bl:#183878;--bbg:#e6eefa;--bbd:#9ab8ec;
  --ra:12px;--shadow:0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}
input,select,button,textarea{font-family:inherit}

/* DESKTOP LAYOUT */
@media (min-width: 700px) {
  body{background:var(--bd)}
  .screen.active{align-items:center}
  .topbar{max-width:480px;margin:0 auto;width:100%;border-radius:0 0 var(--ra) var(--ra)}
  .sbody{max-width:480px;margin:0 auto;width:100%;background:var(--bg);padding:18px 18px 80px}
  .cal-card{max-width:420px;margin:0 auto 14px}
  .cal-grid{gap:4px;padding:6px 12px 14px}
  .cc{max-width:48px;justify-self:center}
  .cnav{width:32px;height:32px}
  .cnum{font-size:13px}
  .cc{cursor:pointer}
  .cc:hover{background:var(--s2)}
  #s-login > div{background:var(--tx)}
  #login-box{box-shadow:0 8px 32px rgba(0,0,0,.25)}
}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
.topbar{background:var(--tx);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar-back{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;padding:0;line-height:1;width:28px}
.topbar-title{font-size:15px;font-weight:600;flex:1}
.topbar-action{background:none;border:none;color:rgba(255,255,255,.85);font-size:12px;font-weight:600;cursor:pointer;padding:4px 0}
.sbody{flex:1;overflow-y:auto;padding:14px 14px 80px}
.sbody.center{display:flex;flex-direction:column;align-items:stretch}
.cal-card{background:var(--sf);border-radius:var(--ra);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--bd)}
.cal-lbl{font-size:15px;font-weight:700}
.cal-navs{display:flex;gap:5px}
.cnav{background:none;border:0.5px solid var(--bd);border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:14px;color:var(--tx);display:inline-flex;align-items:center;justify-content:center}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 10px 4px}
.cal-dow span{text-align:center;font-size:10px;font-weight:700;color:var(--mu)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:4px 10px 12px}
.cc{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:0.5px solid transparent;transition:background .1s}
.cc.today{border-color:var(--tx)}.cc.sel{background:var(--tx)}.cc.sel .cnum{color:#fff}.cc.om .cnum{color:var(--fa)}
.cnum{font-size:13px;font-weight:500;line-height:1}
.cdots{display:flex;gap:2px;margin-top:3px;min-height:5px}
.cdot{width:4px;height:4px;border-radius:50%}
.card{background:var(--sf);border-radius:var(--ra);box-shadow:var(--shadow);overflow:hidden;margin-bottom:10px}
.card-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:0.5px solid var(--bd);background:var(--s2)}
.card-title{font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em}
.card-action{font-size:12px;font-weight:600;color:var(--bl);background:none;border:none;cursor:pointer}
.card-body{padding:12px 14px}
.slbl{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px}
.slbl:first-child{margin-top:0}
.badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:12px;white-space:nowrap;border:0.5px solid;display:inline-block}
.b-done{background:var(--gbg);color:var(--gr);border-color:var(--gbd)}.b-skip{background:var(--rbg);color:var(--re);border-color:var(--rbd)}
.b-rest{background:var(--bg);color:var(--mu);border-color:var(--bd)}.b-plan{background:var(--bbg);color:var(--bl);border-color:var(--bbd)}
.ex-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--bd)}
.ex-row:last-child{border-bottom:none}
.ex-n{font-size:12px}.ex-s{font-size:11px;color:var(--mu)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.stat{background:var(--s2);border-radius:9px;padding:9px 8px;text-align:center}
.stat-v{font-size:17px;font-weight:600}.stat-l{font-size:9px;color:var(--mu);margin-top:2px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mc{background:var(--s2);border-radius:10px;padding:10px 12px}
.mc-lbl{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.mc-val{font-size:19px;font-weight:600;line-height:1}.mc-sub{font-size:10px;color:var(--mu);margin-top:3px}
.pbar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:6px}
.pfill{height:4px;border-radius:2px}
.ppill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:7px;margin-top:4px}
.meal-view{background:var(--s2);border-radius:9px;margin-bottom:8px;overflow:hidden}
.meal-hdr{display:flex;justify-content:space-between;padding:8px 12px;background:var(--bd);align-items:center}
.meal-nm{font-size:12px;font-weight:600}.meal-kc{font-size:11px;font-weight:600;color:var(--bl)}
.meal-body{padding:4px 12px}
.mi{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--bd);align-items:center}
.mi:last-child{border-bottom:none}
.mi-n{font-size:11px;flex:1}.mi-k{font-size:11px;color:var(--mu)}
.mi-del{font-size:16px;color:var(--fa);background:none;border:none;cursor:pointer;padding:0 0 0 8px}
.flags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.flag{font-size:10px;font-weight:500;padding:4px 10px;border-radius:10px;border:0.5px solid}
.fg{background:var(--gbg);color:var(--gr);border-color:var(--gbd)}.fw{background:var(--abg);color:var(--am);border-color:var(--abd)}.fi{background:var(--bbg);color:var(--bl);border-color:var(--bbd)}
.st-row{display:flex;gap:8px;margin-bottom:14px}
.stb{flex:1;padding:10px 4px;border-radius:9px;border:0.5px solid var(--bd);background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;text-align:center;color:var(--mu);transition:all .1s}
.s-done{background:var(--gbg);color:var(--gr);border:1.5px solid var(--gr)}.s-skip{background:var(--rbg);color:var(--re);border:1.5px solid var(--re)}.s-rest{background:var(--bg);color:var(--tx);border:1.5px solid var(--tx)}
.wgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.wf label{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
.wf input,.wf select{width:100%;padding:9px 10px;border:0.5px solid var(--bd);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx);outline:none}
.wf input:focus,.wf select:focus{border-color:var(--tx)}
.food-search{display:flex;gap:8px;margin-bottom:8px}
.food-search input{flex:1;padding:10px 12px;border:0.5px solid var(--bd);border-radius:9px;font-size:13px;background:var(--sf);color:var(--tx);outline:none}
.food-search input:focus{border-color:var(--tx)}
.search-btn{padding:10px 14px;background:var(--tx);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.search-btn:active{opacity:.8}
.lookup-result{background:var(--s2);border:0.5px solid var(--bd);border-radius:9px;padding:10px 12px;margin-bottom:8px}
.lr-name{font-size:13px;font-weight:600;margin-bottom:4px}
.lr-detail{font-size:11px;color:var(--mu);line-height:1.5}
.lr-actions{display:flex;gap:6px;margin-top:8px}
.qty-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.qty-row input{width:80px;padding:8px 10px;border:0.5px solid var(--bd);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx);outline:none;text-align:center}
.qty-row span{font-size:12px;color:var(--mu)}
.meal-type-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mt-btn{padding:6px 14px;border:0.5px solid var(--bd);border-radius:20px;background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;color:var(--mu)}
.mt-btn.on{background:var(--tx);color:#fff;border-color:var(--tx)}
.weight-input{display:flex;align-items:center;gap:10px;margin:8px 0}
.weight-input input{width:100px;padding:10px 12px;border:0.5px solid var(--bd);border-radius:9px;font-size:20px;font-weight:600;background:var(--bg);color:var(--tx);outline:none;text-align:center}
.weight-input input:focus{border-color:var(--tx)}
.weight-unit{font-size:14px;color:var(--mu);font-weight:600}
.weight-trend{display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:12px}
.wt-bar{flex:1;background:var(--bbg);border-radius:4px 4px 0 0;position:relative;min-width:0;transition:height .3s}
.wt-val{font-size:8px;color:var(--bl);text-align:center;margin-top:3px}
.wt-date{font-size:8px;color:var(--mu);text-align:center}
.insight-card{background:var(--sf);border-radius:var(--ra);box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
.ic-title{font-size:13px;font-weight:700;margin-bottom:10px}
.ic-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--bd)}
.ic-row:last-child{border-bottom:none}
.ic-lbl{font-size:12px;color:var(--mu)}.ic-val{font-size:12px;font-weight:600}
.week-dots{display:flex;gap:6px;margin-top:8px}
.wd{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-direction:column}
.wd-lbl{font-size:8px;margin-top:2px}
.btn{width:100%;padding:13px;background:var(--tx);color:#fff;border:none;border-radius:var(--ra);font-size:14px;font-weight:600;cursor:pointer;display:block;text-align:center}
.btn:active{opacity:.85}
.btn-out{background:var(--sf);color:var(--tx);border:0.5px solid var(--bd)}
.btn-sm{background:none;color:var(--re);border:0.5px solid var(--rbd);font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer}
.btn-blue{background:var(--bbg);color:var(--bl);border:0.5px solid var(--bbd);font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer}
.btn-green{background:var(--gbg);color:var(--gr);border:0.5px solid var(--gbd);font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer}
.btn-gap{margin-top:10px}
.wbtns{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.wb{padding:7px 12px;border:0.5px solid var(--bd);border-radius:8px;background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;color:var(--mu)}
.wb.on{background:var(--bbg);color:var(--bl);border-color:var(--bbd)}
.pbtns{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.pb{padding:7px 12px;border:0.5px solid var(--bd);border-radius:8px;background:var(--bg);font-size:11px;font-weight:600;cursor:pointer;color:var(--mu)}
.loading{display:flex;align-items:center;gap:8px;padding:12px;color:var(--mu);font-size:12px}
.spinner{width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--tx);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.divhr{height:0.5px;background:var(--bd);margin:14px 0}
.bnav{background:var(--sf);border-top:0.5px solid var(--bd);padding:8px 0 12px;display:flex;position:fixed;bottom:0;left:0;right:0;z-index:40}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0}
.bnav-icon{font-size:18px;line-height:1}
.bnav-lbl{font-size:9px;font-weight:600;color:var(--mu)}
.bnav-item.on .bnav-lbl{color:var(--tx)}
.empty{text-align:center;padding:24px 16px;color:var(--mu);font-size:12px;line-height:1.7;background:var(--s2);border-radius:var(--ra);border:0.5px dashed var(--fa)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.row-flex{display:flex;justify-content:space-between;align-items:center}
.kbar-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.text-mu{color:var(--mu)}.text-bold{font-weight:600}
.mt-8{margin-top:8px}.mb-8{margin-bottom:8px}
.p-12{padding:12px}
.pin-display{display:flex;gap:10px;justify-content:center;margin:16px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--bd);transition:background .15s}
.pin-dot.filled{background:var(--tx);border-color:var(--tx)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.pin-btn{padding:16px;background:var(--s2);border:0.5px solid var(--bd);border-radius:10px;font-size:20px;font-weight:600;cursor:pointer;text-align:center;color:var(--tx)}
.pin-btn:active{background:var(--bd)}
.pin-btn.del{font-size:16px;color:var(--mu)}
.login-title{font-size:16px;font-weight:700;margin-bottom:4px;text-align:center}
.login-sub{font-size:12px;color:var(--mu);text-align:center;margin-bottom:16px;line-height:1.5}
.login-input{width:100%;padding:12px;border:0.5px solid var(--bd);border-radius:9px;font-size:14px;background:var(--s2);color:var(--tx);outline:none;margin-bottom:8px}
.login-input:focus{border-color:var(--tx)}
.login-link{font-size:12px;color:var(--bl);text-align:center;margin-top:12px;cursor:pointer;background:none;border:none;width:100%}
@media (max-width: 480px) {
  .page,.sbody{padding-left:10px;padding-right:10px}
  .cal-grid{gap:2px;padding:4px 6px 8px}
  .cc{border-radius:6px}
  .cnum{font-size:12px}
  .stat-grid{grid-template-columns:repeat(3,1fr);gap:6px}
  .stat-v{font-size:15px}
  .mgrid{gap:6px}
  .mc-val{font-size:16px}
  .wgrid{grid-template-columns:1fr 1fr;gap:6px}
  .wgrid .wf:last-child{grid-column:1 / -1}
  .food-search{flex-direction:column}
  .food-search input{width:100%}
  .search-btn{width:100%}
  .form3{grid-template-columns:1fr 80px auto}
  .lr-actions{flex-direction:column}
  .lr-actions button{width:100%}
  .topbar{padding:10px 12px}
  .topbar-title{font-size:14px}
  .card-body{padding:10px 12px}
  .card-hdr{padding:10px 12px}
  .daybody{padding:12px}
  .btn{padding:12px;font-size:13px}
  .st-row{gap:6px}
  .stb{font-size:11px;padding:9px 2px}
  .insight-card{padding:12px}
  .week-dots{gap:4px}
  .wd{width:30px;height:30px;font-size:8px}
  .meal-type-row{gap:5px}
  .mt-btn{padding:6px 10px;font-size:11px}
  .wbtns{gap:4px}
  .wb{padding:6px 9px;font-size:11px}
  .pbtns{gap:4px}
  .pb{padding:6px 8px;font-size:10px}
}
.screen{-webkit-overflow-scrolling:touch}
.sbody{-webkit-overflow-scrolling:touch;overflow-y:auto}
input,select,textarea{font-size:16px!important}
.wf input,.wf select{font-size:14px!important}
</style>
</head>
<body>

<div class="screen active" id="s-login">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--tx)">
    <div style="color:#fff;font-size:24px;font-weight:700;margin-bottom:4px">My Dashboard</div>
    <div style="color:rgba(255,255,255,.5);font-size:13px;margin-bottom:40px">Training + nutrition tracker</div>
    <div id="login-box" style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:360px">
      <div id="login-content"></div>
    </div>
  </div>
</div>

<div class="screen" id="s-cal">
  <div class="topbar">
    <div class="topbar-title">My Dashboard</div>
    <button class="topbar-action" onclick="goInsights()">Insights</button>
    <button class="topbar-action" style="margin-left:8px;opacity:.6" onclick="showSettings()">&#9881;</button>
  </div>
  <div class="sbody">
    <div class="cal-card">
      <div class="cal-nav">
        <div class="cal-navs">
          <button class="cnav" id="py">&#171;</button>
          <button class="cnav" id="pm">&#8249;</button>
        </div>
        <div class="cal-lbl" id="cal-lbl"></div>
        <div class="cal-navs">
          <button class="cnav" id="nm">&#8250;</button>
          <button class="cnav" id="ny">&#187;</button>
        </div>
      </div>
      <div class="cal-dow">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="cal-grid" id="cg"></div>
    </div>
    <div style="font-size:11px;color:var(--mu);text-align:center;margin-top:4px">
      <span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px"><span style="width:8px;height:8px;background:var(--gr);border-radius:50%;display:inline-block"></span>Workout done</span>
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:var(--bl);border-radius:50%;display:inline-block"></span>Food logged</span>
    </div>
  </div>
</div>

<div class="screen" id="s-day">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack('s-cal')">&#8249;</button>
    <div class="topbar-title" id="day-title"></div>
  </div>
  <div class="sbody" id="day-body"></div>
</div>

<div class="screen" id="s-training">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack('s-day')">&#8249;</button>
    <div class="topbar-title">Log Training</div>
  </div>
  <div class="sbody" id="training-body"></div>
</div>

<div class="screen" id="s-food">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack('s-day')">&#8249;</button>
    <div class="topbar-title">Log Food</div>
    <div class="topbar-action" id="food-date-lbl"></div>
  </div>
  <div class="sbody" id="food-body"></div>
</div>

<div class="screen" id="s-weight">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack('s-day')">&#8249;</button>
    <div class="topbar-title">Log Weight</div>
  </div>
  <div class="sbody" id="weight-body"></div>
</div>

<div class="screen" id="s-insights">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack('s-cal')">&#8249;</button>
    <div class="topbar-title">Insights</div>
  </div>
  <div class="sbody" id="insights-body"></div>
</div>

<div class="toast" id="tst"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyAnMjUc_j-GE5kJG-5SRx-QStUMIYTQPiU",authDomain:"diet-and-training-dashboard.firebaseapp.com",projectId:"diet-and-training-dashboard",storageBucket:"diet-and-training-dashboard.firebasestorage.app",messagingSenderId:"10655379210",appId:"1:10655379210:web:c3b1b5806588e929e3d4f3"});
var db=firebase.firestore();

var MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
var MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

var KT=1900,WT=4,CT=300;

function getPlan(dk){
  var d=new Date(dk+'T12:00:00');
  var diff=Math.round((d-PSTART)/86400000);
  if(diff<0)return null;
  var wk=Math.floor(diff/7),dow=diff%7;
  if(wk<4)return W14[dow];
  if(wk<8)return W58[dow];
  return P2[dow];
}

function E(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function D(cls){return E('div',cls);}
function T(tag,cls,txt){var e=E(tag,cls);e.textContent=txt;return e;}
function ap(p){for(var i=1;i<arguments.length;i++)if(arguments[i])p.appendChild(arguments[i]);return p;}
function Btn(cls,txt,fn){var b=E('button',cls);b.textContent=txt;b.addEventListener('click',fn);return b;}
function Inp(id,type,ph,val){var i=E('input');i.id=id;i.type=type||'text';if(ph)i.placeholder=ph;if(val!==undefined&&val!==null)i.value=String(val);return i;}

var screenStack=['s-cal'];
function goScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goBack(id){
  goScreen(id);
  if(id==='s-day')renderDayView();
  if(id==='s-cal')renderCal();
}
function goInsights(){renderInsights();goScreen('s-insights');}

function loadAll(){
  db.collection('days').get().then(function(snap){
    snap.forEach(function(d){AD[d.id]=d.data();});
    renderCal();
  }).catch(function(e){console.error('FB:',e);});
}
function saveDay(dk,data,cb){
  db.collection('days').doc(dk).set(data,{merge:true}).then(function(){
    if(!AD[dk])AD[dk]={};
    Object.keys(data).forEach(function(k){AD[dk][k]=data[k];});
    showToast('Saved');renderCal();if(cb)cb();
  }).catch(function(e){showToast('Save failed');console.error(e);});
}

function renderCal(){
  var lbl=document.getElementById('cal-lbl');
  var grid=document.getElementById('cg');
  if(!lbl||!grid)return;
  lbl.textContent=MN[cm]+' '+cy;
  grid.innerHTML='';
  var today=todayKey();
  var first=new Date(cy,cm,1);
  var sdow=first.getDay();
  var dim=new Date(cy,cm+1,0).getDate();
  var pdim=new Date(cy,cm,0).getDate();
  for(var i=0;i<42;i++){
    var day,mo,yr,inM=true;
    if(i<sdow){day=pdim-sdow+i+1;mo=cm-1;yr=cy;if(mo<0){mo=11;yr--;}inM=false;}
    else if(i>=sdow+dim){day=i-sdow-dim+1;mo=cm+1;yr=cy;if(mo>11){mo=0;yr++;}inM=false;}
    else{day=i-sdow+1;mo=cm;yr=cy;}
    var dk=yr+'-'+pad(mo+1)+'-'+pad(day);
    var dd=AD[dk];
    var cc=D('cc');
    if(dk===sd)cc.classList.add('sel');
    if(dk===today)cc.classList.add('today');
    if(!inM)cc.classList.add('om');
    cc.appendChild(T('div','cnum',String(day)));
    var dots=D('cdots');
    if(dd&&dd.training&&dd.training.status==='done'){var d1=D('cdot');d1.style.background='var(--gr)';dots.appendChild(d1);}
    if(dd&&dd.food&&dd.food.meals&&dd.food.meals.length){var d2=D('cdot');d2.style.background='var(--bl)';dots.appendChild(d2);}
    if(dd&&dd.weight){var d3=D('cdot');d3.style.background='var(--am)';dots.appendChild(d3);}
    cc.appendChild(dots);
    (function(dkk,yrr,moo){cc.addEventListener('click',function(){
      sd=dkk;cy=yrr;cm=moo;
      renderDayView();goScreen('s-day');
    });})(dk,yr,mo);
    grid.appendChild(cc);
  }
}

function renderDayView(){
  var d=AD[sd]||{};
  var plan=getPlan(sd);

  var dlabel=DS[dateObj.getDay()]+', '+dateObj.getDate()+' '+MS[dateObj.getMonth()]+' '+dateObj.getFullYear();
  document.getElementById('day-title').textContent=dlabel;
  var body=document.getElementById('day-body');
  body.innerHTML='';

  var tc=D('card');
  var th=D('card-hdr');
  th.appendChild(T('div','card-title','Training'));
  var tBtn=Btn('card-action',d.training&&d.training.status&&d.training.status!=='plan'?'Edit':'Log',function(){renderTrainingForm();goScreen('s-training');});
  th.appendChild(tBtn);tc.appendChild(th);
  var tb=D('card-body');
  if(plan){
    var tnr=D('row-flex mb-8');
    tnr.appendChild(T('div','text-bold',plan.n));
    var st=d.training&&d.training.status?d.training.status:'plan';
    var stMap={done:'b-done',skip:'b-skip',rest:'b-rest',plan:'b-plan'};
    var stLbl={done:'Completed',skip:'Skipped',rest:'Rest day',plan:'Planned'};
    tnr.appendChild(T('div','badge '+(stMap[st]||'b-plan'),stLbl[st]||'Planned'));
    tb.appendChild(tnr);
    if(st==='done'&&d.training&&(d.training.kcal||d.training.hr||d.training.effort)){
      var sg=D('stat-grid');
      function sv(l,v){var s=D('stat');ap(s,T('div','stat-v',String(v||'--')),T('div','stat-l',l));return s;}
      ap(sg,sv('Kcal burned',d.training.kcal||'--'),sv('Heart rate',d.training.hr||'--'),sv('Effort',d.training.effort||'--'));
      tb.appendChild(sg);
    }
    if(plan.ex&&plan.ex.length&&st!=='rest'){
      var el2=D('');el2.style.marginTop='8px';
      plan.ex.forEach(function(e){
        var r=D('ex-row');ap(r,T('span','ex-n',e.n),T('span','ex-s',e.s));el2.appendChild(r);
      });
      tb.appendChild(el2);
    }
  } else {
    tb.appendChild(T('div','text-mu','No workout planned for this date.'));
  }
  tc.appendChild(tb);body.appendChild(tc);

  var fc=D('card');
  var fh=D('card-hdr');
  fh.appendChild(T('div','card-title','Food'));
  var fBtn=Btn('card-action','Log / Edit',function(){renderFoodForm();goScreen('s-food');});
  fh.appendChild(fBtn);fc.appendChild(fh);
  var fb=D('card-body');
  var f=d.food||{};
  var meals=f.meals||[];
  if(meals.length){
    var tk=meals.reduce(function(a,m){return a+(m.kcal||0);},0);
    var kp=pct(tk,KT),wp=pct(f.water||0,WT),cp=pct(f.caffeine||0,CT);
    var mg=D('mgrid');
    function mcCard(lbl,valTxt,color,prog,sub){
      var m=D('mc');ap(m,T('div','mc-lbl',lbl));
      var v=D('mc-val');v.style.color=color;v.textContent=valTxt;m.appendChild(v);
      var pb=D('pbar');var pf=D('pfill');pf.style.cssText='width:'+prog+'%;background:'+color;pb.appendChild(pf);m.appendChild(pb);
      m.appendChild(T('div','mc-sub',sub));return m;
    }
    var pc=PCOLS[f.protein]||['var(--mu)','var(--bg)','var(--bd)'];
    var mcp=D('mc');ap(mcp,T('div','mc-lbl','Protein'));
    if(f.protein){var pill=T('div','ppill',f.protein);pill.style.cssText='background:'+pc[1]+';color:'+pc[0]+';border:0.5px solid '+pc[2];mcp.appendChild(pill);}
    else{mcp.appendChild(T('div','mc-sub','Not set'));}
    ap(mg,
      mcCard('Calories',tk+' / '+KT,kCol(kp),kp,KT-tk>0?(KT-tk)+' kcal remaining':'Target reached'),
      mcCard('Water',(f.water||0)+'L / '+WT+'L',wCol(wp),wp,WT-(f.water||0)>0?(WT-f.water)+'L to go':'Target reached'),
      mcCard('Caffeine',(f.caffeine||0)+'mg',cCol(cp),cp,(f.caffeine||0)>CT?'Over limit - affects sleep':'Within limit'),
      mcp
    );
    fb.appendChild(mg);
    meals.forEach(function(m){
      var mv=D('meal-view');
      var mh=D('meal-hdr');ap(mh,T('span','meal-nm',m.name),T('span','meal-kc',(m.kcal||0)+' kcal'));mv.appendChild(mh);
      if(m.items&&m.items.length){
        var mb=D('meal-body');
        m.items.forEach(function(it){
          var mi=D('mi');
          var mn=T('span','mi-n',it.n);
          var mk=T('span','mi-k',it.k+' kcal');
          if(it.p||it.c||it.fat){
            var detail=' (P:'+Math.round(it.p||0)+'g C:'+Math.round(it.c||0)+'g F:'+Math.round(it.fat||0)+'g)';
            mn.textContent=it.n+detail;
          }
          ap(mi,mn,mk);mb.appendChild(mi);
        });
        mv.appendChild(mb);
      }
      fb.appendChild(mv);
    });
    var flags=autoFlags(f,tk);
    var fd=D('flags');
    flags.forEach(function(fl){fd.appendChild(T('div','flag '+fl.c,fl.t));});
    fb.appendChild(fd);
  } else {
    fb.appendChild(T('div','empty','No food logged yet. Tap Log / Edit to add your meals.'));
  }
  fc.appendChild(fb);body.appendChild(fc);

  var wc=D('card');
  var wh=D('card-hdr');
  wh.appendChild(T('div','card-title','Weight'));
  var wBtn=Btn('card-action','Log',function(){renderWeightForm();goScreen('s-weight');});
  wh.appendChild(wBtn);wc.appendChild(wh);
  var wb=D('card-body');
  if(d.weight){
    var wr=D('row-flex');
    var wv=D('');wv.style.cssText='font-size:28px;font-weight:700';wv.textContent=d.weight+' kg';
    var wt=D('');wt.style.cssText='font-size:11px;color:var(--mu);text-align:right';
    wt.textContent='Morning weight';
    var diff76=Math.round((d.weight-76)*10)/10;
    if(diff76!==0){
      var wdiff=T('div','',diff76>0?'+'+diff76+' from baseline':diff76+' from baseline');
      wdiff.style.cssText='font-size:10px;color:'+(diff76>0?'var(--am)':'var(--gr)');
      wt.appendChild(wdiff);
    }
    ap(wr,wv,wt);wb.appendChild(wr);
  } else {
    wb.appendChild(T('div','text-mu','No weight logged for this day.'));
  }
  wc.appendChild(wb);body.appendChild(wc);
}

function autoFlags(f,tk){
  var fl=[];var w=f.water||0,ca=f.caffeine||0,pr=f.protein||'';
  if(w>=4)fl.push({t:'4L water target hit',c:'fg'});else if(w>=2.5)fl.push({t:w+'L water - keep going',c:'fi'});else fl.push({t:'Low water intake',c:'fw'});
  if(ca>300)fl.push({t:'High caffeine - affects sleep',c:'fw'});else if(ca>0)fl.push({t:'Caffeine within limit',c:'fg'});
  if(!pr||pr==='Low')fl.push({t:'Low protein - add dal/eggs/paneer',c:'fw'});else if(pr==='Low-moderate'||pr==='Moderate')fl.push({t:'Protein moderate - can improve',c:'fi'});else fl.push({t:'Good protein intake',c:'fg'});
  if(tk<1200)fl.push({t:'Very low calories today',c:'fw'});else if(tk<KT)fl.push({t:'Calories below target',c:'fi'});else fl.push({t:'Good calorie intake',c:'fg'});
  return fl;
}

function renderTrainingForm(){
  var d=AD[sd]||{};
  var plan=getPlan(sd);
  var body=document.getElementById('training-body');
  body.innerHTML='';
  if(!plan){body.appendChild(T('div','empty','No workout planned for this date.'));return;}
  var cs=(d.training&&d.training.status)?d.training.status:(plan.t==='rest'?'rest':'plan');
  tStatus=cs;

  var wcard=D('card');
  var wh=D('card-hdr');wh.appendChild(T('div','card-title',plan.ph));wcard.appendChild(wh);
  var wb=D('card-body');
  wb.appendChild(T('div','',plan.n));wb.style.fontWeight='600';
  if(plan.ex&&plan.ex.length){
    plan.ex.forEach(function(e){
      var r=D('ex-row');ap(r,T('span','ex-n',e.n),T('span','ex-s',e.s));wb.appendChild(r);
    });
  }
  wcard.appendChild(wb);body.appendChild(wcard);

  body.appendChild(T('div','slbl','How did it go?'));
  var stRow=D('st-row');
  var watchSlot=D('');
  function mkStBtn(lbl,val){
    var b=Btn('stb',lbl,function(){
      tStatus=val;
      stRow.querySelectorAll('.stb').forEach(function(sb){sb.className='stb';});
      b.classList.add('s-'+val);
      watchSlot.innerHTML='';
      if(val==='done'){watchSlot.appendChild(buildWG(d));}
    });
    if(cs===val)b.classList.add('s-'+val);
    return b;
  }
  ap(stRow,mkStBtn('Completed','done'),mkStBtn('Skipped','skip'),mkStBtn('Rest day','rest'));
  body.appendChild(stRow);
  if(cs==='done'){watchSlot.appendChild(buildWG(d));}
  body.appendChild(watchSlot);
  body.appendChild(Btn('btn btn-gap','Save training',function(){
    var kc=document.getElementById('w-kc');
    var hr=document.getElementById('w-hr');
    var ef=document.getElementById('w-ef');
    saveDay(sd,{training:{name:plan.n,phase:plan.ph,status:tStatus,exercises:plan.ex,
      kcal:(tStatus==='done'&&kc)?(parseInt(kc.value)||null):null,
      hr:(tStatus==='done'&&hr)?(hr.value||null):null,
      effort:(tStatus==='done'&&ef)?(ef.value||null):null
    }},function(){goBack('s-day');});
  }));
}

function buildWG(d){
  var t=(d&&d.training)||{};
  var wg=D('');wg.appendChild(T('div','slbl','Apple Watch stats'));
  var grid=D('wgrid');
  function wf(lbl,id,type,ph,val){
    var f=D('wf');var l=E('label');l.textContent=lbl;
    var i=Inp(id,type,ph,val);ap(f,l,i);return f;
  }
  var efDiv=D('wf');var efLbl=E('label');efLbl.textContent='Effort';
  var efSel=E('select');efSel.id='w-ef';efSel.style.cssText='width:100%;padding:9px 10px;border:0.5px solid var(--bd);border-radius:8px;font-size:13px;background:var(--bg);color:var(--tx);outline:none';
  ['','Easy','Moderate','Hard','Very hard'].forEach(function(o){var opt=E('option');opt.value=o;opt.textContent=o||'--';if(t.effort===o)opt.selected=true;efSel.appendChild(opt);});
  ap(efDiv,efLbl,efSel);
  ap(grid,wf('Kcal burned','w-kc','number','520',t.kcal),wf('Avg HR','w-hr','text','135 bpm',t.hr),efDiv);
  wg.appendChild(grid);return wg;
}

function buildFoodForm(){
  var body=document.getElementById('food-body');
  body.innerHTML='';

  body.appendChild(T('div','slbl','Meal type'));
  var mtRow=D('meal-type-row');
  ['Breakfast','Lunch','Dinner','Snack','Drinks'].forEach(function(mt){
    var b=Btn('mt-btn',mt,function(){
      fMealType=mt;
      mtRow.querySelectorAll('.mt-btn').forEach(function(bb){bb.classList.remove('on');});
      b.classList.add('on');
    });
    if(fMealType===mt)b.classList.add('on');
    mtRow.appendChild(b);
  });
  body.appendChild(mtRow);

  body.appendChild(T('div','slbl','Add food item'));
  var hint=T('div','','Type a food name and quantity - calories and macros are estimated automatically');
  hint.style.cssText='font-size:11px;color:var(--mu);margin-bottom:8px;line-height:1.5';
  body.appendChild(hint);

  var searchRow=D('food-search');
  var sInput=Inp('food-search-input','text','e.g. 100g rice or 1 cup sambar');
  sInput.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doFoodLookup();}});
  var sBtn=Btn('search-btn','Look up',doFoodLookup);
  ap(searchRow,sInput,sBtn);body.appendChild(searchRow);

  var resultArea=D('');resultArea.id='lookup-area';body.appendChild(resultArea);

  if(fItems.length){
    body.appendChild(T('div','slbl','Items in this meal'));
    var itemsDiv=D('');itemsDiv.id='items-div';
    fItems.forEach(function(it,i){
      var mi=D('mi');
      var mn=D('mi-n');mn.textContent=it.n+(it.p?' (P:'+Math.round(it.p)+'g C:'+Math.round(it.c||0)+'g F:'+Math.round(it.fat||0)+'g)':'');
      var mk=T('span','mi-k',it.k+' kcal');
      var del=Btn('mi-del','x',function(){fItems.splice(i,1);buildFoodForm();});
      ap(mi,mn,mk,del);itemsDiv.appendChild(mi);
    });

  var quarterMatch=queryLower.match(/quarter/);
  var fullMatch=queryLower.match(/full/);

  if(numGMatch){userQtyG=parseFloat(numGMatch[1]);}

  var dbKeys=Object.keys(indianDB);

    var key=dbKeys[ki];
    if(queryLower.indexOf(key)>=0||key.split(' ').every(function(w){return queryLower.indexOf(w)>=0;})){
      var qkeys=Object.keys(indianDB[key]);

      if(userQtyG){
        var per100=null;var per100qty='';
        for(var qi2=0;qi2<qkeys.length;qi2++){
          if(qkeys[qi2].indexOf('100g')>=0||qkeys[qi2]==='100g'){
            per100=indianDB[key][qkeys[qi2]];per100qty='100g';break;
          }
        }
        if(per100){
          var ratio=userQtyG/100;
          matched={
            k:Math.round(per100.k*ratio),
            p:Math.round(per100.p*ratio*10)/10,
            c:Math.round(per100.c*ratio*10)/10,
            fat:Math.round(per100.fat*ratio*10)/10
          };
          matchedKey=key;matchedQty=userQtyG+'g';
        }
      }

      if(!matched){
        for(var qi=0;qi<qkeys.length;qi++){
          var qty=qkeys[qi];
          if(halfMatch&&qty.indexOf('half')>=0){matched=indianDB[key][qty];matchedKey=key;matchedQty=qty;break;}
          if(quarterMatch&&qty.indexOf('quarter')>=0){matched=indianDB[key][qty];matchedKey=key;matchedQty=qty;break;}
          if(fullMatch&&qty.indexOf('full')>=0){matched=indianDB[key][qty];matchedKey=key;matchedQty=qty;break;}
          if(queryLower.indexOf(qty)>=0){matched=indianDB[key][qty];matchedKey=key;matchedQty=qty;break;}
        }
      }

      if(!matched){
        matched=indianDB[key][qkeys[0]];matchedKey=key;matchedQty=qkeys[0];
      }

  .then(function(r){return r.json();})
  .then(function(data){

      var p=data.products[0];
      var n=p.nutriments;
      var qMatch=query.match(/(\d+\.?\d*)\s*(g|gm|gms|ml|kg)/i);
      var qAmt=qMatch?parseFloat(qMatch[1]):100;
      var qUnit=qMatch?(qMatch[2].toLowerCase()):'g';
      if(qUnit==='kg')qAmt=qAmt*1000;
      var per100=n['energy-kcal_100g']||(n['energy_100g']?n['energy_100g']/4.184:null);
      if(per100){
        var ratio=qAmt/100;
        showLookupResult(area,{
          name:p.product_name||searchTerm,
          quantity:qAmt+qUnit,
          kcal:Math.round(per100*ratio),
          protein_g:Math.round((n['proteins_100g']||0)*ratio*10)/10,
          carbs_g:Math.round((n['carbohydrates_100g']||0)*ratio*10)/10,
          fat_g:Math.round((n['fat_100g']||0)*ratio*10)/10,
          notes:'Open Food Facts - scaled to '+qAmt+qUnit
        });
      } else {
        showManualEntry(area,query);
      }
    } else {
      showManualEntry(area,query);
    }
  }).catch(function(){
    area.innerHTML='';
    showManualEntry(area,query);
  });
  }
  tryOpenFoodFacts();

function saveMeal(){
  if(!fItems.length){showToast('Add at least one item first');return;}
  var kc=fItems.reduce(function(a,i){return a+i.k;},0);
  fSavedMeals.push({name:fMealType,kcal:kc,items:fItems.slice()});
  fItems=[];fLookupResult=null;
  showToast(fMealType+' saved');
  saveAllFood(false);
}

function saveAllFood(goToDayAfter){
  var cf=document.getElementById('cf-in');
  var caff=cf?(parseInt(cf.value)||0):fCaff;
  var total=fSavedMeals.reduce(function(a,m){return a+(m.kcal||0);},0);
  saveDay(sd,{food:{meals:fSavedMeals,kcal:total,water:fWater,caffeine:caff,protein:fProtein}},function(){
    if(goToDayAfter){goBack('s-day');}else{buildFoodForm();}
  });
}

  hint.style.cssText='font-size:11px;color:var(--mu);margin-bottom:14px;line-height:1.5';
  body.appendChild(hint);
  var wRow=D('weight-input');

  ap(wRow,wIn,T('div','weight-unit','kg'));

  var trend=[];

var currentUserPin = null;
var anthropicKey = null;

function hashPin(pin) {
  var h = 0;
  for (var i = 0; i < pin.length; i++) {
    h = ((h << 5) - h) + pin.charCodeAt(i);
    h = h & h;
  }
  return 'u' + Math.abs(h).toString(36);
}

function checkStoredLogin() {
  var storedPin = localStorage.getItem('dash_pin');
  var storedKey = localStorage.getItem('dash_apikey');
  if (storedPin && storedKey) {
    currentUserPin = storedPin;
    anthropicKey = storedKey;
    return true;
  }
  if (storedPin) {
    currentUserPin = storedPin;
    return 'load_key';
  }
  return false;
}

function initLogin() {
  var stored = checkStoredLogin();
  if (stored === true) {
    goScreen('s-cal');
    seedAndLoad();
    return;
  }
  if (stored === 'load_key') {
    db.collection('users').doc(currentUserPin).get().then(function(doc) {
      if (doc.exists && doc.data().apikey) {
        anthropicKey = doc.data().apikey;
        localStorage.setItem('dash_apikey', anthropicKey);
        goScreen('s-cal');
        seedAndLoad();
      } else {
        showLoginSetup();
      }
    }).catch(function() { showLoginSetup(); });
    return;
  }
  showLoginEntry();
}

function isDesktopInput() {
  return window.matchMedia('(min-width: 700px)').matches && !('ontouchstart' in window);
}

// Builds a PIN entry UI under `box`: dots + either a real keyboard input (desktop)
// or a tap keypad (mobile). Calls onComplete(pin) once 4 digits are entered, and
// onChange() after every digit so callers can clear error states etc.
function buildPinEntry(box, onComplete, onChange) {
  var pin = '';
  var dots = D('pin-display');
  for (var i = 0; i < 4; i++) { dots.appendChild(D('pin-dot')); }
  box.appendChild(dots);

  function updateDots() {
    dots.querySelectorAll('.pin-dot').forEach(function(d, i) {
      d.className = 'pin-dot' + (i < pin.length ? ' filled' : '');
    });
  }

  function setPin(newPin) {
    pin = newPin.replace(/[^0-9]/g, '').slice(0, 4);
    updateDots();
    if (onChange) onChange();
    if (pin.length === 4) onComplete(pin);
  }

  if (isDesktopInput()) {
    var kIn = E('input', 'login-input');
    kIn.type = 'password';
    kIn.inputMode = 'numeric';
    kIn.maxLength = 4;
    kIn.placeholder = 'Type your 4-digit PIN';
    kIn.style.textAlign = 'center';
    kIn.style.letterSpacing = '8px';
    kIn.style.fontSize = '20px';
    kIn.addEventListener('input', function() { setPin(kIn.value); });
    box.appendChild(kIn);
    setTimeout(function() { kIn.focus(); }, 50);
    return { reset: function() { setPin(''); kIn.value = ''; kIn.focus(); } };
  }

  var padEl = D('pin-pad');
  var nums = ['1','2','3','4','5','6','7','8','9','','0','del'];
  nums.forEach(function(n) {
    if (n === '') { padEl.appendChild(D('')); return; }
    var isDel = n === 'del';
    var b = Btn(isDel ? 'pin-btn del' : 'pin-btn', isDel ? String.fromCharCode(9003) : n, function() {
      if (isDel) { setPin(pin.slice(0, -1)); }
      else if (pin.length < 4) { setPin(pin + n); }
    });
    padEl.appendChild(b);
  });
  box.appendChild(padEl);
  return { reset: function() { setPin(''); } };
}

function showLoginEntry() {
  var box = document.getElementById('login-content');
  box.innerHTML = '';
  var title = T('div', 'login-title', 'Welcome back');
  var sub = T('div', 'login-sub', 'Enter your PIN to continue');
  box.appendChild(title);
  box.appendChild(sub);

  var entry = buildPinEntry(box, function(pin) {
    var uid = hashPin(pin);
    db.collection('users').doc(uid).get().then(function(doc) {
      if (doc.exists) {
        currentUserPin = uid;
        anthropicKey = doc.data().apikey || null;
        localStorage.setItem('dash_pin', uid);
        if (anthropicKey) localStorage.setItem('dash_apikey', anthropicKey);
        goScreen('s-cal');
        seedAndLoad();
      } else {
        entry.reset();
        showToastOnLogin('Incorrect PIN');
      }
    }).catch(function() { entry.reset(); showToastOnLogin('Error - try again'); });
  });

  var newBtn = E('button', 'login-link');
  newBtn.textContent = 'New user? Set up account';
  newBtn.addEventListener('click', showLoginSetup);
  box.appendChild(newBtn);
}

function showLoginSetup() {
  var box = document.getElementById('login-content');
  box.innerHTML = '';
  var chosenPin = '';

  function showStep1() {
    box.innerHTML = '';
    box.appendChild(T('div', 'login-title', 'Create your PIN'));
    box.appendChild(T('div', 'login-sub', 'Choose a 4-digit PIN to protect your dashboard'));
    buildPinEntry(box, function(pin) { chosenPin = pin; setTimeout(showStep2, 200); });
    var back = E('button', 'login-link');
    back.textContent = 'Already have an account? Log in';
    back.addEventListener('click', showLoginEntry);
    box.appendChild(back);
  }

  function showStep2() {
    box.innerHTML = '';
    box.appendChild(T('div', 'login-title', 'Confirm PIN'));
    box.appendChild(T('div', 'login-sub', 'Enter your PIN again to confirm'));
    var entry = buildPinEntry(box, function(pin) {
      if (pin === chosenPin) { setTimeout(showStep3, 200); }
      else { entry.reset(); showToastOnLogin('PINs do not match - try again'); }
    });
  }

  function showStep3() {
    box.innerHTML = '';
    box.appendChild(T('div', 'login-title', 'Anthropic API Key'));
    box.appendChild(T('div', 'login-sub', 'Optional - enables AI food calorie lookup. Get yours free at console.anthropic.com'));
    var keyIn = E('input', 'login-input');
    keyIn.placeholder = 'sk-ant-... (optional)';
    keyIn.type = 'password';
    box.appendChild(keyIn);
    var saveBtn = Btn('btn', 'Save and continue', function() { saveUser(keyIn.value.trim()); });
    var skipBtn = Btn('btn btn-out', 'Skip for now', function() { saveUser(''); });
    box.appendChild(saveBtn);
    box.appendChild(skipBtn);
  }

  function saveUser(apikey) {
    var uid = hashPin(chosenPin);
    db.collection('users').doc(uid).set({ apikey: apikey, created: new Date().toISOString() }).then(function() {
      currentUserPin = uid;
      anthropicKey = apikey || null;
      localStorage.setItem('dash_pin', uid);
      if (apikey) localStorage.setItem('dash_apikey', apikey);
      goScreen('s-cal');
      seedAndLoad();
    }).catch(function(e) { showToastOnLogin('Error saving - check connection'); console.error(e); });
  }

  showStep1();
}

function showToastOnLogin(msg) {
  var t = document.getElementById('tst');
  if (t) { t.textContent = msg; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2500); }
}
